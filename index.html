<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semstr</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4ff; --bg2: #ffffff; --bg3: #eeecff; --bg4: #e8e6ff;
  --border: #dbd8ff; --border2: #ede9ff; --text: #1a1540; --text2: #3d3666;

  --pink: #ec4899; --pink-bg: #fce7f3; --cyan: #06b6d4; --cyan-bg: #cffafe;

}
[data-theme="dark"] {

  --border: #2a2848; --border2: #201e38; --text: #e9e6ff; --text2: #b8b0e0;
  --text3: #7a72a8; --text4: #4d4778; --accent: #7c5aff; --accent2: #9b7eff;
  --accent-bg: #1e1c33; --green: #34d399; --green-bg: #052e16;
  --amber: #fbbf24; --amber-bg: #1c1200; --red: #f87171; --red-bg: #2d0a0a;
  --pink: #f472b6; --pink-bg: #2d0a1e; --cyan: #22d3ee; --cyan-bg: #021e2b;

}
[data-palette="ocean"] { --accent: #0ea5e9; --accent2: #38bdf8; --accent-bg: #e0f7ff; }
[data-theme="dark"][data-palette="ocean"] { --accent: #38bdf8; --accent2: #7dd3fc; --accent-bg: #0c2535; }

[data-palette="forest"] { --accent: #16a34a; --accent2: #22c55e; --accent-bg: #dcfce7; }
[data-theme="dark"][data-palette="forest"] { --accent: #34d399; --accent2: #6ee7b7; --accent-bg: #052e16; }

[data-palette="gold"] { --accent: #b45309; --accent2: #d97706; --accent-bg: #fffbeb; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 5px; height: 5px; }

::-webkit-scrollbar-thumb:hover { background: var(--text4); }
#auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }

.auth-box { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 20px; padding: 40px; width: 400px; max-width: 95vw; box-shadow: 0 20px 60px rgba(108,71,255,.12); position: relative; z-index: 1; }
.auth-logo { text-align: center; margin-bottom: 28px; }

.auth-tabs { display: flex; margin-bottom: 24px; background: var(--bg3); border-radius: 10px; padding: 4px; gap: 4px; }
.auth-tab { flex: 1; text-align: center; padding: 8px; border-radius: 7px; cursor: pointer; font-size: .82rem; font-weight: 700; color: var(--text3); transition: all .15s; border: none; background: none; }
.auth-tab.active { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(108,71,255,.35); }
.form-row { margin-bottom: 14px; }

.form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 13px; color: var(--text); font-size: .88rem; outline: none; transition: border-color .15s; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); background: var(--bg2); }
.btn-auth { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: .92rem; font-weight: 800; cursor: pointer; margin-top: 6px; transition: all .15s; box-shadow: 0 4px 14px rgba(108,71,255,.4); }
.btn-auth:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,71,255,.45); }
.auth-msg { text-align: center; font-size: .78rem; margin-top: 12px; min-height: 18px; font-weight: 600; }
.auth-msg.error { color: var(--red); }

#app-screen { display: none; height: 100vh; overflow: hidden; }
.app-layout { display: flex; height: 100vh; }
.sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 39; }
.sb-overlay.show { display: block; }
.sidebar { width: var(--sb-w); background: var(--bg2); border-right: 1.5px solid var(--border); display: flex; flex-direction: column; transition: width .22s ease; overflow: hidden; flex-shrink: 0; z-index: 40; }
.sidebar.collapsed { width: var(--sb-col); }
.sb-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 12px 12px; border-bottom: 1.5px solid var(--border); min-height: 56px; flex-shrink: 0; }
.sb-logo { display:flex; align-items:center; overflow: hidden; min-width:0; }
.sb-logo .c { color: var(--accent); }

.sb-toggle { background: none; border: none; cursor: pointer; color: var(--text3); padding: 5px 7px; border-radius: 7px; flex-shrink: 0; font-size: 1rem; transition: all .15s; }
.sb-toggle:hover { background: var(--bg3); color: var(--text); }
.sb-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; }

.sb-new-btn { margin: 4px 8px 6px; display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; cursor: pointer; background: var(--accent); color: #fff; border: none; font-size: .78rem; font-weight: 800; white-space: nowrap; width: calc(100% - 16px); transition: all .15s; }
.sb-new-btn:hover { background: var(--accent2); }
.sb-new-btn-icon { display: none; margin: 4px auto 6px; width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 1.3rem; align-items: center; justify-content: center; }
.sidebar.collapsed .sb-new-btn-icon { display: flex; }
.sidebar.collapsed .sb-new-btn { display: none; }
.sem-row { display: flex; align-items: center; gap: 0; margin: 1px 8px; border-radius: 10px; overflow: hidden; cursor: pointer; transition: background .15s; position: relative; }
.sem-row:hover { background: var(--bg3); }
.sem-row.active { background: var(--accent-bg); }
.sem-row.active::before { content: ""; position: absolute; left: 0; top: 15%; height: 70%; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
.sem-row-main { display: flex; align-items: center; gap: 8px; padding: 8px 8px 8px 12px; flex: 1; min-width: 0; }
.sem-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.sem-row-name { font-size: .8rem; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.sem-row.active .sem-row-name { color: var(--accent); }
.sem-chevron { font-size: .65rem; color: var(--text4); padding: 8px 8px 8px 4px; transition: transform .2s; flex-shrink: 0; }

.sidebar.collapsed .sem-row-name, .sidebar.collapsed .sem-chevron, .sidebar.collapsed .sb-sect { visibility: hidden; }

.sem-tree { padding: 0 0 4px; border-bottom: 1.5px solid var(--border2); margin-bottom: 2px; }
.course-row { display: flex; align-items: center; gap: 5px; padding: 5px 8px 5px 24px; margin: 1px 8px; border-radius: 8px; cursor: pointer; transition: background .15s; }

.course-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.course-code { font-size: .72rem; font-weight: 800; color: var(--accent); white-space: nowrap; }
.course-name-lbl { font-size: .7rem; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-weight: 600; }
.course-btns { display: flex; gap: 1px; opacity: 0; transition: opacity .15s; margin-left: auto; }

.tree-btn { background: none; border: none; cursor: pointer; color: var(--text4); padding: 2px 4px; border-radius: 4px; font-size: .68rem; }
.tree-btn:hover { background: var(--bg4); color: var(--text2); }
.add-course-row { display: flex; align-items: center; gap: 5px; padding: 5px 8px 5px 24px; margin: 1px 8px; border-radius: 8px; cursor: pointer; color: var(--text4); font-size: .71rem; border: none; background: none; width: calc(100% - 16px); font-weight: 700; font-family: inherit; }
.add-course-row:hover { background: var(--bg3); color: var(--text2); }
.sb-bottom { padding: 10px 8px; border-top: 1.5px solid var(--border); flex-shrink: 0; }
.sb-user { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer; border-radius: 8px; transition: all .2s; }
.sb-user:hover { background: var(--bg3); }
.sb-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; font-size: .82rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; position: relative; }
.sidebar.collapsed .sb-bottom { padding: 10px 4px; }
.sidebar.collapsed .sb-user { justify-content: center; padding: 6px 0; overflow: visible; }
.sidebar.collapsed .sb-email, .sidebar.collapsed .sb-signout { display: none; }
.sidebar.collapsed .sb-avatar { width: 32px; height: 32px; font-size: .85rem; }
.sb-email { font-size: .72rem; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
.sb-signout { background: var(--bg3); border: 1.5px solid var(--border); cursor: pointer; color: var(--text3); font-size: .72rem; padding: 5px 10px; border-radius: 7px; white-space: nowrap; font-family: inherit; font-weight: 700; transition: background .15s, color .15s; }
.sb-signout:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; gap: 10px; padding: 0 18px; height: 56px; border-bottom: 1.5px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.topbar-title { font-size: 1rem; font-weight: 800; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -0.3px; }
.topbar-pill { font-size: .68rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; background: var(--accent-bg); color: var(--accent); letter-spacing: .3px; }
.topbar-btn { background: none; border: 1.5px solid var(--border); cursor: pointer; color: var(--text2); padding: 6px 10px; border-radius: 8px; font-size: .78rem; font-weight: 700; display: flex; align-items: center; gap: 5px; transition: all .15s; font-family: inherit; }
.topbar-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.topbar-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.topbar-btn.primary:hover { background: var(--accent2); }
.hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--text2); font-size: 1.3rem; padding: 4px 6px; }
.tab-nav { display: flex; gap: 2px; padding: 10px 18px 0; border-bottom: 1.5px solid var(--border); background: var(--bg2); flex-shrink: 0; overflow-x: auto; }
.tab-btn { padding: 8px 14px; border: none; background: none; cursor: pointer; font-size: .8rem; font-weight: 700; color: var(--text3); border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; white-space: nowrap; transition: all .15s; font-family: inherit; display: flex; align-items: center; gap: 6px; border-radius: 8px 8px 0 0; }
.tab-btn:hover { color: var(--text); background: var(--bg3); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-icon { display:inline-flex;align-items:center; }
.content-area { flex: 1; overflow-y: auto; padding: 20px 18px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 12px; }
.empty-icon { font-size: 3rem; opacity: .5; }
.empty-title { font-size: 1.1rem; font-weight: 800; color: var(--text2); }
.empty-sub { font-size: .82rem; color: var(--text3); max-width: 320px; line-height: 1.6; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--card-shadow); position: relative; overflow: hidden; transition: transform .12s, box-shadow .12s; display: flex; align-items: center; gap: 14px; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
.stat-card::after { content: ""; position: absolute; bottom: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; opacity: .12; }
.stat-card.purple { border-top: 3px solid var(--accent); } .stat-card.purple::after { background: var(--accent); }
.stat-card.green { border-top: 3px solid var(--green); } .stat-card.green::after { background: var(--green); }
.stat-card.amber { border-top: 3px solid var(--amber); } .stat-card.amber::after { background: var(--amber); }
.stat-card.red { border-top: 3px solid var(--red); } .stat-card.red::after { background: var(--red); }
.stat-card.pink { border-top: 3px solid var(--pink); } .stat-card.pink::after { background: var(--pink); }
.stat-label { font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 6px; }
.stat-value { font-size: 2.2rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.stat-card.purple .stat-value { color: var(--accent); } .stat-card.green .stat-value { color: var(--green); }
.stat-card.amber .stat-value { color: var(--amber); } .stat-card.red .stat-value { color: var(--red); }
.stat-card.pink .stat-value { color: var(--pink); }
.stat-sub { font-size: .72rem; color: var(--text3); margin-top: 4px; font-weight: 600; }
.section-title { font-size: .75rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ""; flex: 1; height: 1.5px; background: var(--border); }
.countdown-grid { display: flex; flex-direction: column; gap: 8px; }
.countdown-item { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; box-shadow: var(--card-shadow); cursor: pointer; transition: all .15s; }
.countdown-item:hover { border-color: var(--accent); transform: translateX(2px); }
.countdown-icon { width: 32px; height: 32px; display:flex; align-items:center; justify-content:center; flex-shrink: 0; }
.countdown-info { flex: 1; min-width: 0; }
.countdown-title { font-size: .85rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.countdown-meta { font-size: .72rem; color: var(--text3); font-weight: 600; margin-top: 2px; }
.countdown-badge { font-size: .72rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-overdue { background: var(--red-bg); color: var(--red); }
.badge-today { background: var(--amber-bg); color: var(--amber); }
.badge-soon { background: var(--cyan-bg); color: var(--cyan); }
.badge-upcoming { background: var(--accent-bg); color: var(--accent); }
.badge-done { background: var(--green-bg); color: var(--green); }
.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.filter-pill { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--text3); font-size: .74rem; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
.filter-pill:hover { border-color: var(--accent); color: var(--accent); }
.filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(108,71,255,.3); }
.filter-search { flex: 1; min-width: 150px; max-width: 280px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; padding: 7px 12px; color: var(--text); font-size: .82rem; outline: none; font-family: inherit; }
.filter-search:focus { border-color: var(--accent); }
.assignment-list { display: flex; flex-direction: column; gap: 6px; }
.assignment-row { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .15s; box-shadow: var(--card-shadow); }
.assignment-row:hover { border-color: var(--accent); background: var(--bg3); }
.assignment-row.done-row { opacity: .65; }
.a-checkbox { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }

.a-info { flex: 1; min-width: 0; }
.a-title { font-size: .87rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-meta { font-size: .72rem; color: var(--text3); margin-top: 2px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.a-course-tag { padding: 1px 7px; border-radius: 4px; font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; }
.a-type-tag { padding: 2px 8px; border-radius: 4px; font-size: .68rem; font-weight: 700; }
.type-assignment { background: var(--cyan-bg); color: var(--cyan); }
.type-exam { background: var(--red-bg); color: var(--red); }
.type-test { background: var(--amber-bg); color: var(--amber); }
.type-lab { background: var(--pink-bg); color: var(--pink); }
.type-project { background: var(--accent-bg); color: var(--accent); }

.due-overdue { color: var(--red); } .due-today { color: var(--amber); }
.due-soon { color: var(--cyan); } .due-upcoming { color: var(--text3); }

.cal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cal-month { font-size: 1.1rem; font-weight: 800; flex: 1; letter-spacing: -0.3px; }
.cal-nav { background: none; border: 1.5px solid var(--border); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.cal-nav:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

.cal-more { font-size: .6rem; font-weight: 700; color: var(--text4); padding: 1px 3px; }

<div id="toast"></div>
<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:flex-end;pointer-events:none"></div>

<!-- SEMESTER MODAL -->
<div class="modal-bg" id="sem-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-title"><span id="sem-modal-title">New Semester</span><button class="modal-close" onclick="closeSemModal()">×</button></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="flbl">Semester Name</label><input id="sem-name" class="inp" placeholder="e.g. Fall 2025"></div>
      <div class="form-grid-2">
        <div><label class="flbl">Start Date</label><input id="sem-start" class="inp" type="date"></div>
        <div><label class="flbl">End Date</label><input id="sem-end" class="inp" type="date"></div>
      </div>
      <div><label class="flbl">Notes</label><input id="sem-gpa-goal" class="inp" placeholder="e.g. Dean's list goal, focus areas..."></div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeSemModal()">Cancel</button><button class="btn btn-primary" onclick="saveSemester()">Save</button></div>
  </div>
</div>

<!-- COURSE MODAL -->
<div class="modal-bg" id="course-modal">
  <div class="modal" style="max-width:460px">
    <div class="modal-title"><span id="course-modal-title">New Course</span><button class="modal-close" onclick="closeCourseModal()">×</button></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="flbl">Course Code</label><input id="c-code" class="inp" placeholder="e.g. CS101"></div>
      <div><label class="flbl">Course Name</label><input id="c-name" class="inp" placeholder="e.g. Introduction to Computer Science"></div>
      <div class="form-grid-2">
        <div><label class="flbl">Instructor</label><input id="c-instructor" class="inp" placeholder="Prof. Name"></div>
        <div><label class="flbl">Credits</label><input id="c-credits" class="inp" type="number" min="0" max="6" step="0.5" placeholder="3"></div>
      </div>
      <div><label class="flbl">Colour</label><div class="color-swatches" id="course-color-swatches"></div></div>
      <div><label class="flbl">Notes / Location</label><input id="c-notes" class="inp" placeholder="Room 201, Mon/Wed 10am"></div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeCourseModal()">Cancel</button><button class="btn btn-primary" onclick="saveCourse()">Save</button></div>
  </div>
</div>

<!-- ASSIGNMENT MODAL -->
<div class="modal-bg" id="assign-modal">
  <div class="modal" style="max-width:500px">
    <div class="modal-title"><span id="assign-modal-title">New Assignment</span><button class="modal-close" onclick="closeAssignModal()">×</button></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="flbl">Title</label><input id="a-title" class="inp" placeholder="Assignment title"></div>
      <div class="form-grid-2">
        <div><label class="flbl">Course</label><select id="a-course" class="inp"><option value="">— Select course —</option></select></div>
        <div><label class="flbl">Type</label><select id="a-type" class="inp"><option value="assignment">Assignment</option><option value="exam">Exam</option><option value="test">Test</option><option value="quiz">Quiz</option><option value="lab">Lab</option><option value="project">Project</option></select></div>
      </div>
      <div class="form-grid-2">
        <div><label class="flbl">Due Date</label><input id="a-due" class="inp" type="date"></div>
        <div><label class="flbl">Priority</label><select id="a-priority" class="inp"><option value="low">Low</option><option value="med" selected>Medium</option><option value="high">High</option></select></div>
      </div>
      <div><label class="flbl">Status</label><select id="a-status" class="inp"><option value="todo">To Do</option><option value="inprogress">In Progress</option><option value="done">Done</option></select></div>
      <div class="form-grid-2">
        <div><label class="flbl">Weight % <span style="font-weight:500;text-transform:none;letter-spacing:0">(of course grade)</span></label><input id="a-weight" class="inp" type="number" min="0" max="100" step="0.5" placeholder="e.g. 20" oninput="updateGradeCalc()"></div>
        <div><label class="flbl">Out of</label><input id="a-total-marks" class="inp" type="number" min="0" step="0.5" placeholder="e.g. 100" oninput="updateGradeCalc()"></div>
      </div>
      <div id="a-marks-row" class="form-grid-2">
        <div><label class="flbl">Marks Received</label><input id="a-marks-received" class="inp" type="number" min="0" step="0.5" placeholder="e.g. 78" oninput="updateGradeCalc()"></div>
        <div id="a-grade-calc" style="display:flex;align-items:flex-end;padding-bottom:2px"></div>
      </div>
      <div><label class="flbl">Notes</label><textarea id="a-notes" class="inp" rows="2" style="resize:vertical" placeholder="Any notes..."></textarea></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px">
      <button class="btn btn-danger btn-sm" id="assign-delete-btn" onclick="deleteAssignment()" style="display:none">Delete</button>
      <div class="modal-actions" style="margin-top:0"><button class="btn btn-ghost" onclick="closeAssignModal()">Cancel</button><button class="btn btn-primary" onclick="saveAssignment()">Save</button></div>
    </div>
  </div>
</div>

<!-- HABIT MODAL -->
<div class="modal-bg" id="habit-modal">
  <div class="modal" style="max-width:400px">
    <div class="modal-title"><span id="habit-modal-title">New Habit</span><button class="modal-close" onclick="closeHabitModal()">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="flbl">Habit Name</label><input id="h-name" class="inp" placeholder="e.g. Meditate, Review notes, Exercise"></div>
      <div><label class="flbl">Description <span style="font-weight:500;text-transform:none;letter-spacing:0">(optional)</span></label><input id="h-notes" class="inp" placeholder="e.g. 5 minutes of deep breathing"></div>
      <div><label class="flbl">Timer Duration <span style="font-weight:500;text-transform:none;letter-spacing:0">(optional — minutes)</span></label><input id="h-duration" class="inp" type="number" min="1" max="120" step="1" placeholder="e.g. 25 for a focused session"></div>
      <div><label class="flbl">Icon</label><div id="h-icon-picker" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div><input type="hidden" id="h-icon" value="meditate"></div>
      <div><label class="flbl">Colour</label><div class="color-swatches" id="h-color-picker"></div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px">
      <button class="btn btn-danger btn-sm" id="habit-delete-btn" onclick="deleteHabit()" style="display:none">Delete</button>
      <div class="modal-actions" style="margin-top:0"><button class="btn btn-ghost" onclick="closeHabitModal()">Cancel</button><button class="btn btn-primary" onclick="saveHabit()">Save</button></div>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;padding:28px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4);">
    <div style="text-align:center;margin-bottom:10px;"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#ef4444" stroke-width="2" opacity=".2"/><path d="M20 12v10M20 27v2" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/></svg></div>
    <h3 id="confirm-title" style="font-size:1rem;font-weight:800;margin:0 0 8px;text-align:center;"></h3>
    <p id="confirm-msg" style="font-size:.82rem;color:var(--text3);text-align:center;margin:0 0 22px;line-height:1.6;font-weight:600;"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button id="confirm-ok-btn" class="btn btn-danger" onclick="confirmOk()">Delete</button>
    </div>
  </div>
</div>

function getLevel(xp) {
  var level = LEVELS[0];
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) { level = LEVELS[i]; break; }
  }
  return level;
}
function getNextLevel(xp) {
  for (var i = 0; i < LEVELS.length; i++) {
    if (LEVELS[i].min > xp) return LEVELS[i];
  }
  return null;
}

window.switchAuthTab = function(tab) {
  currentAuthTab = tab;
  document.querySelectorAll(".auth-tab").forEach(function(b, i) {
    b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
  });
  document.getElementById("name-row").style.display = tab === "signup" ? "block" : "none";
  document.getElementById("auth-submit-btn").textContent = tab === "login" ? "Sign In" : "Create Account";
  document.getElementById("auth-msg").textContent = "";
};

window.doAuth = async function() {
  var email = document.getElementById("auth-email").value.trim();
  var password = document.getElementById("auth-password").value;
  var name = document.getElementById("auth-name").value.trim();
  var msgEl = document.getElementById("auth-msg");
  msgEl.textContent = "";
  if (!email || !password) { msgEl.className = "auth-msg error"; msgEl.textContent = "Please fill in all fields."; return; }
  try {
    var result;
    if (currentAuthTab === "login") {
      result = await sb.auth.signInWithPassword({ email: email, password: password });
    } else {
      result = await sb.auth.signUp({ email: email, password: password, options: { data: { display_name: name || email.split("@")[0] } } });
    }
    if (result.error) throw result.error;
    if (currentAuthTab === "signup" && result.data && !result.data.session) {
      msgEl.className = "auth-msg success";
      msgEl.textContent = "Check your email to confirm your account!";
      return;
    }
    var user = result.data && result.data.user ? result.data.user : null;
    await applySession(user);
  } catch (err) {
    msgEl.className = "auth-msg error";
    msgEl.textContent = err.message || "Authentication failed.";
  }
};

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.getElementById("auth-screen").style.display !== "none") { doAuth(); }
});

window.doSignOut = async function() {
  await sb.auth.signOut();

};

async function loadAll() {
  if (!currentUser) return;
  try {
    var [semRes, courseRes, assignRes, badgeRes, statsRes] = await Promise.all([
      sb.from("semesters").select("*").order("start_date", { ascending: true }),
      sb.from("courses").select("*").order("code"),
      sb.from("assignments").select("*").order("due_date", { ascending: true }),
      sb.from("user_badges").select("badge_id").eq("user_id", currentUser.id),
      sb.from("user_stats").select("*").eq("user_id", currentUser.id).maybeSingle()
    ]);
    if (semRes.error) throw semRes.error;
    if (courseRes.error) throw courseRes.error;
    if (assignRes.error) throw assignRes.error;
    semesters = semRes.data || [];
    courses = courseRes.data || [];
    assignments = assignRes.data || [];
    if (!badgeRes.error) {
      _unlockedBadgeIds = new Set((badgeRes.data || []).map(function(x) { return x.badge_id; }));
    } else {
      console.warn("user_badges fetch error:", badgeRes.error);
      _unlockedBadgeIds = new Set();
    }
    try {
      userStats = (statsRes && statsRes.data) ? statsRes.data : null;
      if (userStats) applyLevelPalette(userStats.xp || 0);
    } catch(e) { userStats = null; }
    try {
      var habitsRes = await sb.from("habits").select("*").eq("user_id", currentUser.id).order("created_at");
      habits = (habitsRes && habitsRes.data) ? habitsRes.data : [];
      var today = localDateStr();
      var logsRes = await sb.from("habit_logs").select("*").eq("user_id", currentUser.id).eq("completed_date", today);
      habitLogs = (logsRes && logsRes.data) ? logsRes.data : [];
    } catch(e) { habits = []; habitLogs = []; }
    var savedSemId = localStorage.getItem("semstr-sem-" + currentUser.id);  // RC2
    if (savedSemId) {
      activeSemester = semesters.find(function(s) { return s.id === savedSemId; }) || null;
    }
    if (!activeSemester && semesters.length > 0) {
      activeSemester = semesters[semesters.length - 1];
    }
    renderSidebar();
    renderActiveTab();
    setTimeout(async function() {
      try {
        await evaluateBadges({ trigger: "load" });
        if (activeTab === "dashboard") renderDashboard();
      } catch(e) { console.warn("badge eval:", e); }
    }, 500);
  } catch (err) {
    console.error("loadAll error:", err);
    showToast("Error loading data: " + err.message, "error");
  }
}

  if (!el) return;
  if (semesters.length === 0) {
    el.innerHTML = '<div style="padding:12px 16px;font-size:.75rem;color:var(--text4);font-weight:600;">No semesters yet</div>';
    return;
  }
  var html = "";
  semesters.forEach(function(sem) {
    var isActive = activeSemester && activeSemester.id === sem.id;
    var isExpanded = uiExpanded[sem.id] !== false;
    var semCourses = courses.filter(function(c) { return c.semester_id === sem.id; });

    html += '<span class="sem-row-name">' + esc(sem.name) + '</span>';
    html += '</div>';
    html += '<span class="sem-chevron' + (isExpanded ? " open" : "") + '" onclick="toggleSemExpand(event,\'' + sem.id + '\')">▶</span>';
    html += '</div>';

      html += '<div class="sem-tree">';
      semCourses.forEach(function(c) {

        html += '<div class="course-dot" style="background:' + (c.color || "#6c47ff") + '"></div>';
        html += '<span class="course-code">' + esc(c.code) + '</span>';
        html += '<span class="course-name-lbl">' + esc(c.name) + '</span>';
        html += '<div class="course-btns">';
        html += '<button class="tree-btn" onclick="openEditCourse(event,\'' + c.id + '\')"><svg width="12" height="12" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle"><path d="M13 3l4 4-9 9-5 1 1-5 9-9z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';

function esc(str) {
  if (!str) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function localDateStr(d) {
  d = d || new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  var d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  var now = new Date(); now.setHours(0,0,0,0);
  var d = new Date(dateStr + "T00:00:00");
  return Math.round((d - now) / 86400000);
}

function getDueBadge(days, status) {
  if (status === "done") return { cls: "badge-done", text: "Done" };
  if (days === null) return { cls: "badge-upcoming", text: "No date" };
  if (days < 0) return { cls: "badge-overdue", text: Math.abs(days) + "d overdue" };
  if (days === 0) return { cls: "badge-today", text: "Due today!" };
  if (days <= 3) return { cls: "badge-soon", text: "In " + days + "d" };
  return { cls: "badge-upcoming", text: "In " + days + "d" };
}

function getDueClass(days, status) {
  if (status === "done") return "due-upcoming";
  if (days === null) return "due-upcoming";
  if (days < 0) return "due-overdue";
  if (days === 0) return "due-today";
  if (days <= 3) return "due-soon";
  return "due-upcoming";
}

function getSemAssignments() {
  if (!activeSemester) return [];
  var semCourseIds = courses.filter(function(c) { return c.semester_id === activeSemester.id; }).map(function(c) { return c.id; });
  return assignments.filter(function(a) { return semCourseIds.indexOf(a.course_id) > -1; });
}

function getCourseById(id) {
  return courses.find(function(c) { return c.id === id; }) || null;
}

function calculateGPA(semAssignments) {
  var graded = semAssignments.filter(function(a) {
    return a.marks_received != null && a.total_marks != null && a.total_marks > 0 && a.weight != null && a.weight > 0;
  });
  if (graded.length === 0) return null;
  var weightedScore = 0; var totalWeight = 0;
  graded.forEach(function(a) {
    weightedScore += (a.marks_received / a.total_marks) * a.weight;
    totalWeight += a.weight;
  });
  return totalWeight > 0 ? Math.round(weightedScore / totalWeight * 100) : null;
}

      html += '<div class="countdown-info"><div class="countdown-title">' + esc(a.title) + '</div><div class="countdown-meta">' + (course ? esc(course.code) + ' · ' : '') + esc(formatDate(a.due_date)) + '</div></div>';
      html += '<span class="countdown-badge ' + badge.cls + '">' + badge.text + '</span>';

    });

  }

  if (semCourses.length > 0) {

      html += '<div class="course-header-card" style="cursor:pointer;margin-bottom:0" onclick="selectCourse(\'' + course.id + '\')">';

      html += '<div class="course-header-name" style="font-size:.9rem">' + esc(course.name) + '</div>';
      html += '<div class="progress-bar-wrap" style="margin-top:6px"><div class="progress-bar" style="width:' + cpct + '%;background:' + (course.color||"var(--accent)") + '"></div></div></div>';
      var cGrade = calculateCourseGrade(course.id);
      html += '<div style="text-align:right;flex-shrink:0"><span style="font-size:.75rem;font-weight:800;color:' + (course.color||"var(--accent)") + '">' + cpct + '%</span>';
      if (cGrade) {

}


function renderAssignments() {
  var ca = document.getElementById("content-area");
  var semA = getSemAssignments();

  var filtered = semA.filter(function(a) {
    if (assignFilter === "todo") return a.status === "todo";
    if (assignFilter === "inprogress") return a.status === "inprogress";

    if (assignFilter === "overdue") return a.status !== "done" && daysUntil(a.due_date) < 0;
    if (assignFilter === "upcoming") { var d = daysUntil(a.due_date); return a.status !== "done" && d !== null && d >= 0 && d <= 7; }
    return true;

  var html = '<div class="fade-in">';

    html += '<div class="course-header-card">';

    html += '<div class="course-header-name">' + esc(course.name) + '</div>';
    html += '<div class="course-header-meta">' + (course.instructor ? '<svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;"><circle cx="10" cy="6" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> ' + esc(course.instructor) : '') + (course.credits ? ' &nbsp;·&nbsp; ' + course.credits + ' credits' : '') + (course.notes ? ' &nbsp;·&nbsp; ' + esc(course.notes) : '') + '</div>';
    var cg = calculateCourseGrade(course.id);
    if (cg) {
      var cgColor = cg.grade >= 80 ? "var(--green)" : cg.grade >= 60 ? "var(--amber)" : "var(--red)";
      html += '<div style="margin-top:6px;display:flex;gap:10px;align-items:center"><span style="font-size:.8rem;font-weight:800;color:' + cgColor + '"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;"><path d="M3 15V9l4-4 4 4 4-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> ' + cg.grade + '% course grade</span><span style="font-size:.72rem;color:var(--text3);font-weight:600">(' + cg.weightCovered + '% of grade covered)</span></div>';
    }

    var cdone = ca2.filter(function(a) { return a.status === "done"; }).length;
    html += '<div class="course-stats"><div class="course-stat"><div class="course-stat-val" style="color:' + (course.color||"var(--accent)") + '">' + cdone + '/' + ca2.length + '</div><div class="course-stat-lbl">Done</div></div></div>';
    html += '</div>';
  }
  html += '<div class="filter-bar">';
  ["all","todo","inprogress","done","overdue","upcoming"].forEach(function(f) {
    var labels = {all:"All",todo:"To Do",inprogress:"In Progress",done:"Done",overdue:"Overdue",upcoming:"This Week"};
    html += '<button class="filter-pill' + (assignFilter === f ? " active" : "") + '" onclick="setFilter(\'' + f + '\')">' + labels[f] + '</button>';
  });
  html += '<input class="filter-search" placeholder="Search..." value="' + esc(assignSearch) + '" oninput="setSearch(this.value)"></div>';

  if (filtered.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 20 20" fill="none" style="color:var(--accent);opacity:.4"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M13.5 13.5l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 9h4M9 7v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".6"/></svg></div><div class="empty-title">Nothing here</div><div class="empty-sub">No assignments match your filter. Try changing the filter or add a new one!</div></div>';
  } else {
    html += '<div class="assignment-list">';
    filtered.forEach(function(a) {
      var course = getCourseById(a.course_id);
      var days = daysUntil(a.due_date);
      var dueClass = getDueClass(days, a.status);
      var dueText = a.due_date ? formatDate(a.due_date) : "No date";
      if (days !== null && a.status !== "done") {
        if (days < 0) dueText += " (" + Math.abs(days) + "d late)";
        else if (days === 0) dueText = "Due today!";

      var gradeColor = gradePct != null ? (gradePct >= 80 ? "var(--green)" : gradePct >= 60 ? "var(--amber)" : "var(--red)") : "var(--text3)";

      html += '<div class="a-checkbox' + (a.status === "done" ? " checked" : (needsGrade ? " needs-grade" : "")) + '" title="' + (needsGrade ? "Enter marks first" : "") + '" onclick="toggleDone(event,\'' + a.id + '\')"></div>';

      html += '<span class="a-type-tag type-' + (a.type||"assignment") + '">' + (TYPE_EMOJI[a.type]||TYPE_EMOJI.assignment) + ' ' + (a.type||"assignment") + '</span>';
      if (a.weight) html += '<span style="font-size:.68rem;color:var(--text3);font-weight:700">' + a.weight + '% weight</span>';
      html += '</div></div>';
      if (a.total_marks != null && a.total_marks > 0) {
        html += '<div class="a-grade-inline" onclick="event.stopPropagation()">';
        if (hasGrade) {
          html += '<span style="font-size:.9rem;font-weight:900;color:' + gradeColor + '">' + gradePct + '%</span>';
          html += '<span style="font-size:.68rem;color:var(--text3);margin-left:4px">' + a.marks_received + '/' + a.total_marks + '</span>';
        } else {
          html += '<input class="grade-quick-input" type="number" min="0" max="' + a.total_marks + '" step="0.5" placeholder="Score" title="Enter marks out of ' + a.total_marks + '" onchange="saveInlineGrade(event,\'' + a.id + '\',' + a.total_marks + ')" onkeydown="if(event.key===\'Enter\'){saveInlineGrade(event,\'' + a.id + '\',' + a.total_marks + ');this.blur()}" onclick="event.stopPropagation()">';
          html += '<span style="font-size:.68rem;color:var(--text3);font-weight:700;margin-left:3px">/ ' + a.total_marks + '</span>';
        }

      }
      html += '<div class="' + dueClass + ' a-due">' + dueText + '</div>';
      html += '<div class="a-priority prio-' + (a.priority||"med") + '"></div>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  ca.innerHTML = html;
}

window.setFilter = function(f) { assignFilter = f; renderAssignments(); };
window.setSearch = function(v) { assignSearch = v; renderAssignments(); };

window.saveInlineGrade = async function(e, id, totalMarks) {
  var val = parseFloat(e.target.value);
  if (isNaN(val) || e.target.value === "") return;
  if (val < 0) val = 0;
  if (val > totalMarks) val = totalMarks;
  var a = assignments.find(function(x) { return x.id === id; });
  if (!a) return;
  a.marks_received = val;
  try {
    var res = await sb.from("assignments").update({ marks_received: val }).eq("id", id);
    if (res.error) throw res.error;
    renderAssignments();
  } catch(err) { a.marks_received = null; showToast(err.message, "error"); }
};

window.toggleDone = async function(e, id) {
  e.stopPropagation();
  var a = assignments.find(function(x) { return x.id === id; });
  if (!a) return;
  if (a.status !== "done" && a.total_marks != null && a.total_marks > 0 && (a.marks_received == null)) {
    showToast("Enter your score first!", "error");
    var rows = document.querySelectorAll(".assignment-row");
    rows.forEach(function(row) {
      var cb = row.querySelector(".a-checkbox");
      if (cb && cb.getAttribute("onclick") && cb.getAttribute("onclick").includes(id)) {
        var gi = row.querySelector(".grade-quick-input");
        if (gi) { gi.classList.add("shake"); gi.focus(); setTimeout(function() { gi.classList.remove("shake"); }, 500); }
      }
    });
    return;
  }
  var newStatus = a.status === "done" ? "todo" : "done";
  try {
    var updatePayload = { status: newStatus };
    if (newStatus === "done") updatePayload.updated_at = new Date().toISOString();
    var res = await sb.from("assignments").update(updatePayload).eq("id", id);
    if (res.error) throw res.error;
    a.status = newStatus;
    if (newStatus === "done") a.updated_at = updatePayload.updated_at;
    if (newStatus === "done") { launchConfetti(); await awardXP(a); }
    else { await deductXP(a); }
    renderActiveTab();
  } catch (err) { showToast(err.message, "error"); }
};

async function ensureStats() {
  if (userStats) return userStats;
  var res = await sb.from("user_stats").insert({ user_id: currentUser.id, xp: 0, streak: 0, badges: [] }).select().single();
  if (res.error) throw res.error;
  userStats = res.data;
  return userStats;
}

function getBadgeProgress(badgeId) {
  var doneCount = assignments.filter(function(a) { return a.status === "done"; }).length;
  var streak    = (userStats && userStats.streak) || 0;
  var xp        = (userStats && userStats.xp) || 0;
  var levelIdx  = getLevelIndex(xp);
  var semCourses = activeSemester ? courses.filter(function(c) { return c.semester_id === activeSemester.id; }) : [];
  var withNotes  = assignments.filter(function(a) { return a.notes && a.notes.trim().length > 0; }).length;
  switch (badgeId) {
    case "first_step":     return { current: doneCount, target: 1 };
    case "focused_finish": return { current: doneCount, target: 10 };
    case "task_titan":     return { current: doneCount, target: 25 };
    case "legend":         return { current: doneCount, target: 100 };
    case "on_fire":           return { current: streak, target: 5 };
    case "relentless":        return { current: streak, target: 10 };
    case "unstoppable":       return { current: streak, target: 30 };
    case "semester_ironman":  return { current: streak, target: 60 };
    case "semester_architect": return { current: semesters.length, target: 1 };
    case "course_starter":     return { current: courses.length,   target: 1 };
    case "full_load":          return { current: semCourses.length, target: 5 };
    case "organized_mind":     return { current: withNotes, target: 10 };
    case "planner_mode":       return { current: assignments.length, target: 20 };
    case "course_master": {
      var best = 0;
      courses.forEach(function(c) {
        var ca = assignments.filter(function(a) { return a.course_id === c.id; });
        if (ca.length > 0) { var donePct = ca.filter(function(a) { return a.status === "done"; }).length / ca.length; if (donePct > best) best = donePct; }
      });
      return { current: Math.round(best * 100), target: 100, unit: "%" };
    }
    case "double_major": {
      var completed = courses.filter(function(c) {
        var ca = assignments.filter(function(a) { return a.course_id === c.id; });
        return ca.length > 0 && ca.every(function(a) { return a.status === "done"; });
      }).length;
      return { current: completed, target: 2 };
    }
    case "final_boss": {
      var semA2 = activeSemester ? assignments.filter(function(a) {
        var c = courses.find(function(c2) { return c2.id === a.course_id; });
        return c && c.semester_id === activeSemester.id;
      }) : [];
      var doneSem = semA2.filter(function(a) { return a.status === "done"; }).length;
      return semA2.length > 0 ? { current: doneSem, target: semA2.length } : null;
    }
    case "routine_builder":
    case "consistency_king":
    case "discipline_mode": {
      var maxHabitStreak = 0;
      habits.forEach(function(h) {
        var el = document.getElementById("streak-" + h.id);
        if (el) { var nm = el.textContent.match(/\d+/); if (nm) { var num = parseInt(nm[0]); if (!isNaN(num) && num > maxHabitStreak) maxHabitStreak = num; } }
      });
      if (badgeId === "routine_builder") return { current: Math.min(maxHabitStreak, 3), target: 3, unit: "days" };
      if (badgeId === "consistency_king") return { current: Math.min(maxHabitStreak, 7), target: 7, unit: "days" };
      return { current: Math.min(maxHabitStreak, 30), target: 30, unit: "days" };
    }
    case "habit_garden": return { current: habits.length, target: 5 };
    case "level_up":    return { current: Math.min(levelIdx, 2), target: 2 };
    case "scholar":     return { current: Math.min(levelIdx, 5), target: 5 };
    case "grandmaster": return { current: Math.min(levelIdx, 7), target: 7 };
    default: return null;
  }
}

var _unlockedBadgeIds = null;

async function fetchUserBadgeIds() {
  var res = await sb.from("user_badges").select("badge_id").eq("user_id", currentUser.id);
  if (res.error) { console.warn("fetchUserBadgeIds:", res.error); return new Set(); }
  _unlockedBadgeIds = new Set((res.data || []).map(function(x) { return x.badge_id; }));
  return _unlockedBadgeIds;
}

async function grantBadge(badgeId) {
  var res = await sb.from("user_badges").insert({ user_id: currentUser.id, badge_id: badgeId }).select();
  if (res.error) {
    if (res.error.code !== "23505") console.warn("grantBadge", badgeId, res.error);
    if (_unlockedBadgeIds) _unlockedBadgeIds.add(badgeId);
    return false;
  }
  if (_unlockedBadgeIds) _unlockedBadgeIds.add(badgeId);
  var alreadyHad = !res.data || res.data.length === 0;
  if (alreadyHad) return false;
  var bdef = BADGE_DEFS.find(function(b) { return b.id === badgeId; });
  if (bdef) {
    if (bdef.xpBonus > 0 && userStats) {
      var newXp = (userStats.xp || 0) + bdef.xpBonus;
      await sb.from("user_stats").update({ xp: newXp }).eq("user_id", currentUser.id);
      userStats.xp = newXp;
    }
    setTimeout(function() {
      showBadgeToast({ icon: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;"><path d="M7 2h2.5l.5 3H8L7 2zm3.5 0H13l-1 3h-2l.5-3z" fill="white" opacity=".9"/><circle cx="10" cy="12" r="5" fill="white" opacity=".9"/><path d="M8.5 12.2l1 1 2-2.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>', name: bdef.name, desc: bdef.desc + " · +" + bdef.xpBonus + " XP" });
      if (activeTab === "dashboard") renderDashboard();
    }, 600);
  }
  return true;
}

function sameLocalDay(dateLike, refDate) {
  var d = new Date(dateLike);
  return d.getFullYear() === refDate.getFullYear() && d.getMonth() === refDate.getMonth() && d.getDate() === refDate.getDate();
}

function getLevelIndex(xp) {
  var idx = 0;
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) { idx = i + 1; break; }
  }
  return idx;
}

async function evaluateBadges(context) {
  try {
    var unlocked = _unlockedBadgeIds || await fetchUserBadgeIds();
    var xp = (userStats && userStats.xp) || 0;
    var streak = (userStats && userStats.streak) || 0;
    var levelIdx = getLevelIndex(xp);
    var now = new Date();
    var hour = now.getHours();
    var dow = now.getDay();
    var allDone = assignments.filter(function(a) { return a.status === "done"; });
    var doneCount = allDone.length;
    var doneToday = allDone.filter(function(a) { return a.updated_at && sameLocalDay(a.updated_at, now); }).length;
    if (doneCount >= 1   && !unlocked.has("first_step"))     await grantBadge("first_step");
    if (doneToday >= 3   && !unlocked.has("momentum"))       await grantBadge("momentum");
    if (doneToday >= 5   && !unlocked.has("speed_runner"))   await grantBadge("speed_runner");
    if (doneCount >= 10  && !unlocked.has("focused_finish")) await grantBadge("focused_finish");
    if (doneCount >= 25  && !unlocked.has("task_titan"))     await grantBadge("task_titan");
    if (doneCount >= 100 && !unlocked.has("legend"))         await grantBadge("legend");
    if (context && context.trigger === "assignment") {
      if (hour < 8  && !unlocked.has("early_bird"))       await grantBadge("early_bird");
      if (hour >= 0 && hour < 3 && !unlocked.has("night_owl")) await grantBadge("night_owl");
      if ((dow === 0 || dow === 6) && !unlocked.has("weekend_warrior")) {
        var wkRes = await sb.from("assignments").select("id,updated_at").eq("user_id", currentUser.id).eq("status","done");
        if (!wkRes.error) {
          var wkCount = (wkRes.data || []).filter(function(a) { if (!a.updated_at) return false; var d = new Date(a.updated_at).getDay(); return d === 0 || d === 6; }).length;
          if (wkCount >= 5) await grantBadge("weekend_warrior");
        }
      }
    }
    if (streak >= 5  && !unlocked.has("on_fire"))          await grantBadge("on_fire");
    if (streak >= 10 && !unlocked.has("relentless"))        await grantBadge("relentless");
    if (streak >= 30 && !unlocked.has("unstoppable"))       await grantBadge("unstoppable");
    if (streak >= 60 && !unlocked.has("semester_ironman"))  await grantBadge("semester_ironman");
    var habRes = await sb.from("habits").select("id",{count:"exact",head:true}).eq("user_id", currentUser.id);
    if (!habRes.error && habRes.count >= 5 && !unlocked.has("habit_garden")) await grantBadge("habit_garden");
    if (semesters.length >= 1 && !unlocked.has("semester_architect")) await grantBadge("semester_architect");
    if (courses.length >= 1   && !unlocked.has("course_starter"))     await grantBadge("course_starter");
    if (assignments.length >= 20 && !unlocked.has("planner_mode"))    await grantBadge("planner_mode");
    if (!unlocked.has("full_load") && activeSemester) {
      var semCourses = courses.filter(function(c) { return c.semester_id === activeSemester.id; });
      if (semCourses.length >= 5) await grantBadge("full_load");
    }
    if (!unlocked.has("organized_mind")) {
      var withNotes = assignments.filter(function(a) { return a.notes && a.notes.trim().length > 0; }).length;
      if (withNotes >= 10) await grantBadge("organized_mind");
    }
    if (!unlocked.has("course_master")) {
      var completedCourses = 0;
      courses.forEach(function(c) {
        var ca = assignments.filter(function(a) { return a.course_id === c.id; });
        if (ca.length > 0 && ca.every(function(a) { return a.status === "done"; })) completedCourses++;
      });
      if (completedCourses >= 1) await grantBadge("course_master");
      if (completedCourses >= 2 && !unlocked.has("double_major")) await grantBadge("double_major");
    }
    if (!unlocked.has("final_boss") && activeSemester) {
      var semA = assignments.filter(function(a) { var c = courses.find(function(c2) { return c2.id === a.course_id; }); return c && c.semester_id === activeSemester.id; });
      if (semA.length > 0 && semA.every(function(a) { return a.status === "done"; })) await grantBadge("final_boss");
    }
    if (levelIdx >= 2  && !unlocked.has("level_up"))    await grantBadge("level_up");
    if (levelIdx >= 5  && !unlocked.has("scholar"))     await grantBadge("scholar");
    if (levelIdx >= 7  && !unlocked.has("grandmaster")) await grantBadge("grandmaster");
  } catch(err) { console.warn("evaluateBadges:", err); }
}

async function awardXP(assignment) {
  try {
    var stats = await ensureStats();
    var xpGain = XP_VALUES[assignment.type] || 20;
    if (assignment.marks_received != null && assignment.total_marks > 0) {
      var pct = assignment.marks_received / assignment.total_marks * 100;
      if (pct >= 90) xpGain += XP_GRADE_A;
      else if (pct >= 80) xpGain += XP_GRADE_B;
    }
    var today = localDateStr();
    var yesterday = localDateStr(new Date(Date.now() - 86400000));
    var lastDate = stats.last_completion_date;
    var newStreak = stats.streak || 0;
    if (lastDate === today) { /* same day */ }
    else if (lastDate === yesterday) { newStreak++; }
    else { newStreak = 1; }
    var newXP = (stats.xp || 0) + xpGain;
    var oldLevel = getLevel(stats.xp || 0);
    var newLevel = getLevel(newXP);
    var updates = { xp: newXP, streak: newStreak, last_completion_date: today };
    var upRes = await sb.from("user_stats").update(updates).eq("user_id", currentUser.id);
    if (upRes.error) throw upRes.error;
    userStats = Object.assign({}, stats, updates);
    var msg = "+" + xpGain + " XP";
    if (newLevel.name !== oldLevel.name) {
      applyLevelPalette(newXP);
      setTimeout(function() {
        // RC2: getLevelIconSvg for level up toast
        showBadgeToast({ icon: getLevelIconSvg(newLevel.icon), name: "Level Up! " + newLevel.name, desc: "You reached " + newLevel.name + " · " + newXP + " XP total" });
      }, 500);
      if (activeTab === "dashboard") renderDashboard();
    } else if (newStreak > 1) {
      msg += " · " + newStreak + " day streak! 🔥";
    }
    showToast(msg, "success");
    evaluateBadges({ trigger: "assignment", data: { assignment: assignment } });
  } catch(err) { console.warn("XP error:", err); }
}

async function deductXP(assignment) {
  try {
    if (!userStats) return;
    var xpLoss = XP_VALUES[assignment.type] || 20;
    var newXP = Math.max(0, (userStats.xp || 0) - xpLoss);
    await sb.from("user_stats").update({ xp: newXP }).eq("user_id", currentUser.id);
    userStats = Object.assign({}, userStats, { xp: newXP });
    showToast("-" + xpLoss + " XP");
  } catch(err) { console.warn("XP deduct error:", err); }
}

var calDragId = null;
function renderCalendar() {
  var ca = document.getElementById("content-area");
  var semA = getSemAssignments();
  var year = calViewDate.getFullYear();
  var month = calViewDate.getMonth();
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var html = '<div class="fade-in"><div class="cal-header">';
  html += '<button class="cal-nav" onclick="calNav(-1)">◀</button>';
  html += '<div class="cal-month">' + monthNames[month] + ' ' + year + '</div>';
  html += '<button class="cal-nav" onclick="calNav(1)">▶</button>';
  html += '<button class="btn btn-ghost btn-sm" onclick="calToday()">Today</button>';
  html += '<button class="btn btn-ghost btn-sm" onclick="openIcalModal()" style="margin-left:auto"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;"><rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.2" opacity=".45"/><path d="M7 2v3M13 2v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> Import Calendar</button>';
  html += '</div><div class="cal-grid">';
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(function(d) { html += '<div class="cal-dow">' + d + '</div>'; });
  for (var i = 0; i < firstDay; i++) {
    html += '<div class="cal-day other-month"><div class="cal-day-num">' + (new Date(year, month, -firstDay + i + 1).getDate()) + '</div></div>';
  }
  for (var day = 1; day <= daysInMonth; day++) {
    var d = new Date(year, month, day); d.setHours(0,0,0,0);
    var isToday = d.getTime() === today.getTime();
    var dateStr = year + "-" + String(month+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
    var dayAssigns = semA.filter(function(a) { return a.due_date === dateStr; });
    html += '<div class="cal-day' + (isToday ? " today" : "") + '" data-date="' + dateStr + '" ondragover="calDragOver(event)" ondragleave="calDragLeave(event)" ondrop="calDrop(event,\'' + dateStr + '\')">';
    html += '<div class="cal-day-num">' + day + '</div>';
    var shown = 0;
    dayAssigns.forEach(function(a) {
      if (shown >= 3) return; shown++;
      var course = getCourseById(a.course_id);
      var color = (course && course.color) || "#6c47ff";
      var isDone = a.status === "done";
      html += '<div class="cal-event' + (isDone ? " cal-event-done" : "") + '" draggable="true" data-id="' + a.id + '" style="background:' + color + '22;color:' + color + ';border-left:3px solid ' + color + '" ondragstart="calDragStart(event,\'' + a.id + '\')" onclick="event.stopPropagation();openEditAssignment(\'' + a.id + '\')">' + (isDone ? "✓ " : "") + esc(a.title) + '</div>';
    });
    if (dayAssigns.length > 3) html += '<div class="cal-more">+' + (dayAssigns.length-3) + ' more</div>';
    html += '</div>';
  }
  var total = firstDay + daysInMonth;
  var trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (var t = 1; t <= trailing; t++) { html += '<div class="cal-day other-month"><div class="cal-day-num">' + t + '</div></div>'; }
  html += '</div></div>';
  ca.innerHTML = html;
}

window.calNav = function(dir) { calViewDate.setMonth(calViewDate.getMonth() + dir); renderCalendar(); };
window.calToday = function() { calViewDate = new Date(); renderCalendar(); };
window.calDragStart = function(e, id) { calDragId = id; e.dataTransfer.effectAllowed = "move"; e.target.style.opacity = "0.4"; };
window.calDragOver = function(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; var cell = e.currentTarget; if (!cell.classList.contains("other-month")) { cell.classList.add("cal-drop-target"); } };
window.calDragLeave = function(e) { e.currentTarget.classList.remove("cal-drop-target"); };
window.calDrop = async function(e, dateStr) {
  e.preventDefault();
  e.currentTarget.classList.remove("cal-drop-target");
  if (!calDragId) return;
  var id = calDragId; calDragId = null;
  var a = assignments.find(function(x) { return x.id === id; });
  if (!a || a.due_date === dateStr) return;
  try {
    var res = await sb.from("assignments").update({ due_date: dateStr }).eq("id", id);
    if (res.error) throw res.error;
    a.due_date = dateStr; renderCalendar(); showToast("Moved to " + formatDate(dateStr) + " ✅", "success");
  } catch(err) { showToast(err.message, "error"); renderCalendar(); }
};

function renderGantt() {

    return;
  }
  var start = new Date(activeSemester.start_date + "T00:00:00");

  });

          html += '<td class="gantt-bar-cell" onclick="openEditAssignment(\'' + a.id + '\')"><div class="gantt-bar" style="background:' + color + ';width:85%;margin:0 auto" title="' + esc(a.title) + '"></div></td>';

function populateCourseDropdown(selected) {

window.closeAssignModal = function() { document.getElementById("assign-modal").classList.remove("open"); };
window.updateGradeCalc = function() {
  var marks = parseFloat(document.getElementById("a-marks-received").value);
  var total = parseFloat(document.getElementById("a-total-marks").value);
  var weight = parseFloat(document.getElementById("a-weight").value);
  var el = document.getElementById("a-grade-calc");
  if (!el) return;
  if (!isNaN(marks) && !isNaN(total) && total > 0) {
    var pct = Math.round(marks / total * 100);
    var contribution = (!isNaN(weight) && weight > 0) ? (marks / total * weight).toFixed(1) : null;
    var color = pct >= 80 ? "var(--green)" : pct >= 60 ? "var(--amber)" : "var(--red)";
    el.innerHTML = '<div style="background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;width:100%"><div style="font-size:1.1rem;font-weight:900;color:' + color + '">' + pct + '%</div>' + (contribution ? '<div style="font-size:.7rem;color:var(--text3);font-weight:700">Contributes ' + contribution + '% to course</div>' : '') + '</div>';
  } else { el.innerHTML = ""; }
};
function calculateCourseGrade(courseId) {
  var courseAssignments = assignments.filter(function(a) {
    return a.course_id === courseId && a.marks_received != null && a.total_marks != null && a.total_marks > 0 && a.weight != null && a.weight > 0;
  });
  if (courseAssignments.length === 0) return null;
  var totalWeight = 0, weightedScore = 0;
  courseAssignments.forEach(function(a) { var pct = a.marks_received / a.total_marks; weightedScore += pct * a.weight; totalWeight += a.weight; });
  if (totalWeight === 0) return null;
  return { grade: Math.round(weightedScore / totalWeight * 100), weightCovered: Math.round(totalWeight) };
}

    };

    if (wVal) payload.weight = parseFloat(wVal);

    var res = editingAssignmentId
      ? await sb.from("assignments").update(payload).eq("id", editingAssignmentId).select().single()

    if (res.error) throw res.error;
    closeAssignModal(); await loadAll(); renderActiveTab();

async function loadHabitStreak(habitId) {
  try {
    var res = await sb.from("habit_logs").select("completed_date").eq("habit_id", habitId).order("completed_date", { ascending: false }).limit(60);
    var logs = (res && res.data) ? res.data.map(function(l) { return l.completed_date; }) : [];
    var streak = 0;
    var d = new Date(); d.setHours(0,0,0,0);
    var todayStr = localDateStr(d);
    var checkDate = new Date(d);
    if (logs.indexOf(todayStr) === -1) checkDate.setDate(checkDate.getDate() - 1);
    while (true) {
      var ds = localDateStr(checkDate);
      if (logs.indexOf(ds) > -1) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
      else break;
    }
    var el = document.getElementById("streak-" + habitId);
    if (el) el.innerHTML = streak > 0 ? "<svg width=\"13\" height=\"13\" viewBox=\"0 0 20 20\" fill=\"none\" style=\"display:inline-block;vertical-align:middle;margin-right:2px\"><path d=\"M10 3c.4 2.2-1 3.8-1.9 5-.9 1.1-1.4 2.1-1.4 3.3a3.3 3.3 0 0 0 6.6 0c0-1-.4-1.9-1.1-2.7C14.2 9.3 15.5 11 15.5 13A5.5 5.5 0 0 1 5 13C5 9.8 7.6 7.5 10 3z\" fill=\"currentColor\" opacity=\".9\"/></svg>" + streak + " day streak" : "Start your streak today!";
  } catch(e) {}
}

window.toggleHabit = async function(e, habitId) {
  e.stopPropagation();
  var today = localDateStr();
  var idx = habitLogs.findIndex(function(l) { return l.habit_id === habitId; });
  var isDone = idx > -1;
  try {
    if (isDone) {
      await sb.from("habit_logs").delete().eq("habit_id", habitId).eq("completed_date", today);
      habitLogs.splice(idx, 1);
      if (userStats) {
        var newXP = Math.max(0, (userStats.xp || 0) - 10);
        await sb.from("user_stats").update({ xp: newXP }).eq("user_id", currentUser.id);
        userStats = Object.assign({}, userStats, { xp: newXP });
        showToast("-10 XP");
      }
    } else {
      var res = await sb.from("habit_logs").insert({ habit_id: habitId, completed_date: today, user_id: currentUser.id }).select().single();
      if (res.error) throw res.error;
      habitLogs.push(res.data);
      try { await awardHabitXP(habitId); } catch(xe) {}
    }
    renderHabits();
  } catch(err) { showToast(err.message, "error"); }
};

async function awardHabitXP(habitId) {
  var stats = await ensureStats();
  var today = localDateStr();
  var yesterday = localDateStr(new Date(Date.now() - 86400000));
  var lastDate = stats.last_completion_date;
  var newStreak = stats.streak || 0;
  if (lastDate === yesterday) newStreak++;
  else if (lastDate !== today) newStreak = 1;
  var newXP = (stats.xp || 0) + 10;
  var oldLevel = getLevel(stats.xp || 0);
  var newLevel = getLevel(newXP);
  await sb.from("user_stats").update({ xp: newXP, streak: newStreak, last_completion_date: today }).eq("user_id", currentUser.id);
  userStats = Object.assign({}, stats, { xp: newXP, streak: newStreak, last_completion_date: today });
  var msg = "+10 XP";
  // RC2: getLevelIconSvg for level up message
  if (newLevel.name !== oldLevel.name) msg += " · Level up! " + newLevel.name;
  else if (newStreak > 1) msg += " · " + newStreak + " day streak! 🔥";
  showToast(msg, "success");
  try {
    var logRes = await sb.from("habit_logs").select("completed_date").eq("habit_id", habitId).order("completed_date", {ascending: false}).limit(31);
    if (!logRes.error && logRes.data) {
      var dates = logRes.data.map(function(l) { return l.completed_date; });
      var streak2 = 0;
      var cursor = new Date(); cursor.setHours(0,0,0,0);
      for (var i = 0; i < dates.length; i++) {
        var d = new Date(dates[i]); d.setHours(0,0,0,0);
        if (d.getTime() === cursor.getTime()) { streak2++; cursor.setDate(cursor.getDate()-1); }
        else break;
      }
      var unlocked2 = _unlockedBadgeIds || await fetchUserBadgeIds();
      if (streak2 >= 3  && !unlocked2.has("routine_builder"))  await grantBadge("routine_builder");
      if (streak2 >= 7  && !unlocked2.has("consistency_king")) await grantBadge("consistency_king");
      if (streak2 >= 30 && !unlocked2.has("discipline_mode"))  await grantBadge("discipline_mode");
    }
  } catch(be) { console.warn("habit badge check:", be); }
  evaluateBadges({ trigger: "habit" });
}

function populateHabitIconPicker(selected) {
  var el = document.getElementById("h-icon-picker");
  if (!el) return;
  el.innerHTML = "";
  Object.keys(HABIT_ICONS).forEach(function(key) {
    var isSelected = key === selected;
    var iconVal = HABIT_ICONS[key];
    var isSvg = iconVal && iconVal.trim().startsWith("<svg");
    var btn = document.createElement("button");
    btn.type = "button";
    btn.title = key;
    btn.innerHTML = isSvg ? iconVal : '<span style="font-size:1.2rem;line-height:1">' + iconVal + '</span>';
    btn.style.cssText = "width:38px;height:38px;border-radius:9px;border:2px solid " + (isSelected ? "var(--accent)" : "var(--border)") + ";background:" + (isSelected ? "var(--accent-bg)" : "var(--bg3)") + ";cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;color:var(--text2);";
    var s = btn.querySelector("svg");
    if (s) s.style.cssText = "width:20px;height:20px;pointer-events:none;";
    btn.onclick = function() {
      document.getElementById("h-icon").value = key;
      document.querySelectorAll("#h-icon-picker button").forEach(function(b) {
        b.style.borderColor = "var(--border)"; b.style.background = "var(--bg3)";
      });
      btn.style.borderColor = "var(--accent)"; btn.style.background = "var(--accent-bg)";
    };
    el.appendChild(btn);
  });
}

function populateHabitColorPicker(selected) {
  var el = document.getElementById("h-color-picker");
  if (!el) return;
  el.innerHTML = "";
  HABIT_COLORS.forEach(function(c) {
    var s = document.createElement("div");
    s.className = "color-swatch" + (c === selected ? " selected" : "");
    s.style.background = c;
    s.setAttribute("data-color", c);
    s.onclick = function() {
      document.querySelectorAll("#h-color-picker .color-swatch").forEach(function(x) { x.classList.remove("selected"); });
      s.classList.add("selected");
    };
    el.appendChild(s);
  });
}

window.topbarAdd = function() {
  if (activeTab === "habits") { openAddHabitModal(); }
  else if (activeTab === "courses") { openAddCourseModal(null, activeSemester ? activeSemester.id : null); }
  else { openAddAssignmentModal(); }
};

window.openAddHabitModal = function() {
  editingHabitId = null;
  document.getElementById("habit-modal-title").textContent = "New Habit";
  document.getElementById("h-name").value = "";
  document.getElementById("h-notes").value = "";
  document.getElementById("h-icon").value = "meditate";
  document.getElementById("habit-delete-btn").style.display = "none";
  document.getElementById("h-duration").value = "";
  populateHabitIconPicker("meditate");
  populateHabitColorPicker("#6c47ff");
  document.getElementById("habit-modal").classList.add("open");
};

window.openEditHabitModal = function(id) {
  var h = habits.find(function(x) { return x.id === id; });
  if (!h) return;
  editingHabitId = id;
  document.getElementById("habit-modal-title").textContent = "Edit Habit";
  document.getElementById("h-name").value = h.name || "";
  document.getElementById("h-notes").value = h.notes || "";
  document.getElementById("h-icon").value = h.icon || "meditate";
  document.getElementById("h-duration").value = h.duration_minutes || "";
