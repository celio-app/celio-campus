window.closeHabitModal = function() { document.getElementById("habit-modal").classList.remove("open"); };

window.saveHabit = async function() {
  var name = document.getElementById("h-name").value.trim();
  if (!name) { showToast("Habit name is required", "error"); return; }
  var icon = document.getElementById("h-icon").value.trim() || "⭐";
  var colorEl = document.querySelector("#h-color-picker .color-swatch.selected");
  var color = colorEl ? colorEl.getAttribute("data-color") : "#6c47ff";
  try {
    var notes = document.getElementById("h-notes").value.trim() || null;
    var durVal = document.getElementById("h-duration").value;
    var duration_minutes = durVal ? parseInt(durVal) : null;
    var payload = { name: name, icon: icon, color: color, notes: notes, duration_minutes: duration_minutes };
    var res;
    if (editingHabitId) {
      res = await sb.from("habits").update(payload).eq("id", editingHabitId).select().single();
    } else {
      payload.user_id = currentUser.id;
      res = await sb.from("habits").insert(payload).select().single();
    }
    if (res.error) throw res.error;
    closeHabitModal();
    var habitsRes = await sb.from("habits").select("*").eq("user_id", currentUser.id).order("created_at");
    habits = (habitsRes && habitsRes.data) ? habitsRes.data : [];
    renderHabits();
    showToast(editingHabitId ? "Habit updated!" : "Habit added! 🔥", "success");
  } catch(err) { showToast(err.message, "error"); }
};

window.deleteHabit = function() {
  if (!editingHabitId) return;
  var h = habits.find(function(x) { return x.id === editingHabitId; });
  showConfirm("Delete Habit", "Delete \"" + (h ? h.name : "this habit") + "\"? All logs will be lost.", async function() {
    try {
      var res = await sb.from("habits").delete().eq("id", editingHabitId);
      if (res.error) throw res.error;
      closeHabitModal();
      habits = habits.filter(function(x) { return x.id !== editingHabitId; });
      renderHabits();
      showToast("Habit deleted.");
    } catch(err) { showToast(err.message, "error"); }
  });
};

function buildAvatarHtml(initial, size, fontSize) {
  size = size || 52; fontSize = fontSize || Math.round(size * 0.42);
  var xp = (userStats && userStats.xp) || 0;
  var level = getLevel(xp);
  var gradients = { default:"linear-gradient(135deg,#6c47ff,#ec4899)", ocean:"linear-gradient(135deg,#0ea5e9,#6c47ff)", sakura:"linear-gradient(135deg,#e11d78,#f97316)", forest:"linear-gradient(135deg,#16a34a,#0ea5e9)", midnight:"linear-gradient(135deg,#4f46e5,#ec4899)", ember:"linear-gradient(135deg,#ea580c,#f59e0b)", gold:"linear-gradient(135deg,#b45309,#ea580c)" };
  var grad = gradients[level.theme || "default"] || gradients.default;
  return '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + grad + ';display:flex;align-items:center;justify-content:center;font-size:' + fontSize + 'px;font-weight:900;color:#fff;letter-spacing:-1px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.2)">' + (initial || "?").toUpperCase() + '</div>';
}

var _timerHabitId = null;
var _timerInterval = null;
var _timerSecondsLeft = 0;
var _timerTotalSeconds = 0;
var _timerPaused = false;
var _timerEndTime = null;
var _timerPausedAt = null;

function playChime() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[220, 0.5], [440, 0.3], [660, 0.15], [880, 0.08]].forEach(function(pair) {
      var freq = pair[0], gain = pair[1];
      var osc = ctx.createOscillator(); var env = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      env.gain.setValueAtTime(0, ctx.currentTime);
      env.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.05);
      env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3.5);
      osc.connect(env); env.connect(ctx.destination);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 3.5);
    });
  } catch(e) {}
}

function updateTimerWidget() {
  var mins = Math.floor(_timerSecondsLeft / 60);
  var secs = _timerSecondsLeft % 60;
  var display = String(mins).padStart(2,"0") + ":" + String(secs).padStart(2,"0");
  var dispEl = document.getElementById("timer-display");
  var ringEl = document.getElementById("timer-ring");
  var statusEl = document.getElementById("timer-status");
  var pauseBtn = document.getElementById("timer-pause-btn");
  if (dispEl) dispEl.textContent = display;
  if (statusEl) statusEl.textContent = _timerPaused ? "Paused" : "Focus";
  if (pauseBtn) pauseBtn.textContent = _timerPaused ? "▶ Resume" : "⏸ Pause";
  if (ringEl && _timerTotalSeconds > 0) {
    var progress = _timerSecondsLeft / _timerTotalSeconds;
    ringEl.style.strokeDashoffset = 263.9 * (1 - progress);
    ringEl.style.stroke = progress > 0.5 ? "var(--accent)" : progress > 0.25 ? "var(--amber)" : "var(--red)";
  }
}

window.startHabitTimer = function(habitId) {
  var h = habits.find(function(x) { return x.id === habitId; });
  if (!h || !h.duration_minutes) return;
  if (_timerHabitId === habitId && _timerInterval) { document.getElementById("habit-timer-widget").style.display = "block"; return; }
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  _timerHabitId = habitId;
  _timerTotalSeconds = h.duration_minutes * 60;
  _timerSecondsLeft = _timerTotalSeconds;
  _timerPaused = false; _timerPausedAt = null;
  var nameEl = document.getElementById("timer-habit-name");
  var iconEl = document.getElementById("timer-habit-icon");
  if (nameEl) nameEl.textContent = h.name;
  if (iconEl) iconEl.textContent = h.icon || "⏱";
  var ringEl = document.getElementById("timer-ring");
  if (ringEl) ringEl.style.stroke = "var(--accent)";
  document.getElementById("habit-timer-widget").style.display = "block";
  updateTimerWidget();
  if (activeTab === "habits") renderHabits();
  _timerEndTime = Date.now() + _timerTotalSeconds * 1000;
  _timerInterval = setInterval(function() {
    if (_timerPaused) return;
    var remaining = Math.max(0, Math.round((_timerEndTime - Date.now()) / 1000));
    _timerSecondsLeft = remaining;
    updateTimerWidget();
    if (remaining <= 0) { clearInterval(_timerInterval); _timerInterval = null; completeHabitTimer(); }
  }, 500);
};

window.toggleHabitTimer = function() {
  if (!_timerPaused) {
    _timerPaused = true; _timerPausedAt = Date.now();
  } else {
    _timerPaused = false;
    if (_timerPausedAt) { _timerEndTime += Date.now() - _timerPausedAt; _timerPausedAt = null; }
  }
  updateTimerWidget();
};

document.addEventListener("visibilitychange", function() {
  if (!document.hidden && _timerInterval && !_timerPaused && _timerEndTime) {
    var remaining = Math.max(0, Math.round((_timerEndTime - Date.now()) / 1000));
    _timerSecondsLeft = remaining; updateTimerWidget();
    if (remaining <= 0) { clearInterval(_timerInterval); _timerInterval = null; completeHabitTimer(); }
  }
});

window.cancelHabitTimer = function() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  _timerHabitId = null; _timerPaused = false;
  document.getElementById("habit-timer-widget").style.display = "none";
  if (activeTab === "habits") renderHabits();
};

window.skipHabitTimer = function() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  completeHabitTimer();
};

async function completeHabitTimer() {
  var habitId = _timerHabitId;
  _timerHabitId = null; _timerPaused = false;
  var widget = document.getElementById("habit-timer-widget");
  if (widget) {
    widget.style.transition = "opacity .4s"; widget.style.opacity = "0";
    setTimeout(function() { widget.style.display = "none"; widget.style.opacity = "1"; widget.style.transition = ""; }, 400);
  }
  playChime(); launchConfetti();
  var already = habitLogs.findIndex(function(l) { return l.habit_id === habitId; });
  if (already === -1) {
    try {
      var today = localDateStr();
      var res = await sb.from("habit_logs").insert({ habit_id: habitId, completed_date: today, user_id: currentUser.id }).select().single();
      if (!res.error) { habitLogs.push(res.data); await awardHabitXP(habitId); }
    } catch(e) { console.warn("timer complete:", e); }
  }
  showToast("Session complete! 🎉 Great work!", "success");
  if (activeTab === "habits") renderHabits();
}

// ===== AUTH BOOT (RC2: semstr localStorage keys) =====
async function applySession(user) {
  currentUser = user || null;
  if (currentUser) {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    var savedTheme = localStorage.getItem("semstr-theme") || "light";  // RC2
    document.documentElement.setAttribute("data-theme", savedTheme);
    updateLogos(savedTheme);
    document.querySelector(".theme-btn").innerHTML = savedTheme === "dark" ? '<svg width="16" height="16" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;"><circle cx="10" cy="10" r="4" fill="currentColor"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.9 4.9l1.4 1.4M13.7 13.7l1.4 1.4M4.9 15.1l1.4-1.4M13.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>' : '<svg width="16" height="16" viewBox="0 0 20 20" fill="none" style="display:inline-block;vertical-align:middle;"><path d="M14 11.5A6 6 0 0 1 6.5 4c0-.4 0-.8.1-1.2A7 7 0 1 0 15.2 13c-.4.2-.8.4-1.2.5z" fill="currentColor"/></svg>';
    var savedPalette = localStorage.getItem("semstr-palette") || "";  // RC2
    if (savedPalette) document.documentElement.setAttribute("data-palette", savedPalette);
    else document.documentElement.removeAttribute("data-palette");
    if (localStorage.getItem("semstr-sb-collapsed") === "1") {  // RC2
      document.getElementById("sidebar").classList.add("collapsed");
    }
    await loadAll();
    if (semesters.length > 0 && activeSemester) {
      document.getElementById("tab-nav").style.display = "flex";
      document.getElementById("topbar-add-btn").style.display = "flex";
      showTab("dashboard");
    } else {
      document.getElementById("tab-nav").style.display = "none";
      document.getElementById("topbar-add-btn").style.display = "none";
    }
  } else {
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
    semesters = []; courses = []; assignments = [];
    activeSemester = null; activeCourse = null;
  }
}

(async function boot() {
  try {
    var r = await sb.auth.getSession();
    var user = r && r.data && r.data.session && r.data.session.user ? r.data.session.user : null;
    await applySession(user);
  } catch(e) { await applySession(null); }
})();

})();
</script>
