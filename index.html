<!DOCTYPE html>

<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celio Campus</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES ===== */
:root {
  --bg: #f5f4ff;
  --bg2: #ffffff;
  --bg3: #eeecff;
  --bg4: #e8e6ff;
  --border: #dbd8ff;
  --border2: #ede9ff;
  --text: #1a1540;
  --text2: #3d3666;
  --text3: #7b6fa0;
  --text4: #a99fca;
  --accent: #6c47ff;
  --accent2: #8b67ff;
  --accent-bg: #ede9ff;
  --green: #22c55e;
  --green-bg: #dcfce7;
  --amber: #f59e0b;
  --amber-bg: #fef3c7;
  --red: #ef4444;
  --red-bg: #fee2e2;
  --pink: #ec4899;
  --pink-bg: #fce7f3;
  --cyan: #06b6d4;
  --cyan-bg: #cffafe;
  --sb-w: 248px;
  --sb-col: 54px;
  --card-shadow: 0 2px 12px rgba(108,71,255,.08);
  --radius: 14px;
  --radius-sm: 8px;
}
[data-theme="dark"] {
  --bg: #0e0d1a;
  --bg2: #17162a;
  --bg3: #1e1c33;
  --bg4: #141327;
  --border: #2a2848;
  --border2: #201e38;
  --text: #e9e6ff;
  --text2: #b8b0e0;
  --text3: #7a72a8;
  --text4: #4d4778;
  --accent: #7c5aff;
  --accent2: #9b7eff;
  --accent-bg: #1e1c33;
  --green: #34d399;
  --green-bg: #052e16;
  --amber: #fbbf24;
  --amber-bg: #1c1200;
  --red: #f87171;
  --red-bg: #2d0a0a;
  --pink: #f472b6;
  --pink-bg: #2d0a1e;
  --cyan: #22d3ee;
  --cyan-bg: #021e2b;
  --card-shadow: none;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: “Nunito”, system-ui, sans-serif; background: var(–bg); color: var(–text); min-height: 100vh; font-size: 14px; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(–text4); }

/* ===== AUTH ===== */
#auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(–bg); position: relative; overflow: hidden; }
#auth-screen::before { content: “”; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(108,71,255,.15) 0%, transparent 70%); pointer-events: none; }
#auth-screen::after { content: “”; position: absolute; bottom: -200px; left: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(236,72,153,.1) 0%, transparent 70%); pointer-events: none; }
.auth-box { background: var(–bg2); border: 1.5px solid var(–border); border-radius: 20px; padding: 40px; width: 400px; max-width: 95vw; box-shadow: 0 20px 60px rgba(108,71,255,.12); position: relative; z-index: 1; }
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo-mark { font-size: 2.6rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.auth-logo-mark .c { color: var(–accent); }
.auth-tagline { color: var(–text3); font-size: .8rem; margin-top: 6px; font-weight: 600; }
.auth-tabs { display: flex; margin-bottom: 24px; background: var(–bg3); border-radius: 10px; padding: 4px; gap: 4px; }
.auth-tab { flex: 1; text-align: center; padding: 8px; border-radius: 7px; cursor: pointer; font-size: .82rem; font-weight: 700; color: var(–text3); transition: all .15s; border: none; background: none; }
.auth-tab.active { background: var(–accent); color: #fff; box-shadow: 0 2px 8px rgba(108,71,255,.35); }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: .71rem; color: var(–text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .6px; font-weight: 800; }
.form-row input, .form-row select, .form-row textarea { width: 100%; background: var(–bg3); border: 1.5px solid var(–border); border-radius: 10px; padding: 10px 13px; color: var(–text); font-size: .88rem; outline: none; transition: border-color .15s; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(–accent); background: var(–bg2); }
.btn-auth { width: 100%; padding: 12px; background: var(–accent); color: #fff; border: none; border-radius: 10px; font-size: .92rem; font-weight: 800; cursor: pointer; margin-top: 6px; transition: all .15s; box-shadow: 0 4px 14px rgba(108,71,255,.4); }
.btn-auth:hover { background: var(–accent2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,71,255,.45); }
.auth-msg { text-align: center; font-size: .78rem; margin-top: 12px; min-height: 18px; font-weight: 600; }
.auth-msg.error { color: var(–red); }
.auth-msg.success { color: var(–green); }

/* ===== APP LAYOUT ===== */
#app-screen { display: none; height: 100vh; overflow: hidden; }
.app-layout { display: flex; height: 100vh; }

/* ===== SIDEBAR ===== */
.sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 39; }
.sb-overlay.show { display: block; }
.sidebar { width: var(–sb-w); background: var(–bg2); border-right: 1.5px solid var(–border); display: flex; flex-direction: column; transition: width .22s ease; overflow: hidden; flex-shrink: 0; z-index: 40; }
.sidebar.collapsed { width: var(–sb-col); }
.sb-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 12px 12px; border-bottom: 1.5px solid var(–border); min-height: 56px; flex-shrink: 0; }
.sb-logo { font-size: 1.15rem; font-weight: 900; white-space: nowrap; overflow: hidden; letter-spacing: -0.5px; }
.sb-logo .c { color: var(–accent); }
.sb-logo .campus { font-size: .65rem; font-weight: 700; color: var(–text3); text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-top: -2px; }
.sb-toggle { background: none; border: none; cursor: pointer; color: var(–text3); padding: 5px 7px; border-radius: 7px; flex-shrink: 0; font-size: 1rem; transition: all .15s; }
.sb-toggle:hover { background: var(–bg3); color: var(–text); }
.sb-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; }
.sb-sect { padding: 10px 14px 4px; font-size: .61rem; text-transform: uppercase; letter-spacing: 1px; color: var(–text4); font-weight: 800; white-space: nowrap; }
.sidebar.collapsed .sb-sect { opacity: 0; pointer-events: none; }

/* Sidebar new semester button */
.sb-new-btn { margin: 4px 8px 6px; display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; cursor: pointer; background: var(–accent); color: #fff; border: none; font-size: .78rem; font-weight: 800; white-space: nowrap; width: calc(100% - 16px); transition: all .15s; }
.sb-new-btn:hover { background: var(–accent2); }
.sb-new-btn-icon { display: none; margin: 4px auto 6px; width: 36px; height: 36px; border-radius: 10px; background: var(–accent); color: #fff; border: none; cursor: pointer; font-size: 1.3rem; align-items: center; justify-content: center; }
.sidebar.collapsed .sb-new-btn-icon { display: flex; }
.sidebar.collapsed .sb-new-btn { display: none; }

/* Semester rows */
.sem-row { display: flex; align-items: center; gap: 0; margin: 1px 8px; border-radius: 10px; overflow: hidden; cursor: pointer; transition: background .15s; position: relative; }
.sem-row:hover { background: var(–bg3); }
.sem-row.active { background: var(–accent-bg); }
.sem-row.active::before { content: “”; position: absolute; left: 0; top: 15%; height: 70%; width: 3px; background: var(–accent); border-radius: 0 3px 3px 0; }
.sem-row-main { display: flex; align-items: center; gap: 8px; padding: 8px 8px 8px 12px; flex: 1; min-width: 0; }
.sem-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.sem-row-name { font-size: .8rem; font-weight: 700; color: var(–text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.sem-row.active .sem-row-name { color: var(–accent); }
.sem-chevron { font-size: .65rem; color: var(–text4); padding: 8px 8px 8px 4px; transition: transform .2s; flex-shrink: 0; }
.sem-chevron.open { transform: rotate(90deg); }
.sidebar.collapsed .sem-row-name, .sidebar.collapsed .sem-chevron, .sidebar.collapsed .sb-sect { visibility: hidden; }
.sidebar.collapsed .sem-tree { display: none; }

/* Course rows (inside semester) */
.sem-tree { padding: 0 0 4px; border-bottom: 1.5px solid var(–border2); margin-bottom: 2px; }
.course-row { display: flex; align-items: center; gap: 5px; padding: 5px 8px 5px 24px; margin: 1px 8px; border-radius: 8px; cursor: pointer; transition: background .15s; }
.course-row:hover { background: var(–bg3); }
.course-row.active { background: var(–bg3); }
.course-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.course-code { font-size: .72rem; font-weight: 800; color: var(–accent); white-space: nowrap; }
.course-name-lbl { font-size: .7rem; color: var(–text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-weight: 600; }
.course-btns { display: flex; gap: 1px; opacity: 0; transition: opacity .15s; margin-left: auto; }
.course-row:hover .course-btns { opacity: 1; }
.tree-btn { background: none; border: none; cursor: pointer; color: var(–text4); padding: 2px 4px; border-radius: 4px; font-size: .68rem; }
.tree-btn:hover { background: var(–bg4); color: var(–text2); }
.add-course-row { display: flex; align-items: center; gap: 5px; padding: 5px 8px 5px 24px; margin: 1px 8px; border-radius: 8px; cursor: pointer; color: var(–text4); font-size: .71rem; border: none; background: none; width: calc(100% - 16px); font-weight: 700; font-family: inherit; }
.add-course-row:hover { background: var(–bg3); color: var(–text2); }

/* Sidebar bottom */
.sb-bottom { padding: 10px 8px; border-top: 1.5px solid var(–border); flex-shrink: 0; }
.sb-user { display: flex; align-items: center; gap: 8px; padding: 6px 10px; overflow: hidden; cursor: pointer; border-radius: 8px; }
.sb-user:hover { background: var(–bg3); }
.sb-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(–accent); color: #fff; font-size: .75rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sb-email { font-size: .72rem; color: var(–text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
.sb-signout { background: var(–bg3); border: 1.5px solid var(–border); cursor: pointer; color: var(–text3); font-size: .72rem; padding: 5px 10px; border-radius: 7px; white-space: nowrap; font-family: inherit; font-weight: 700; transition: background .15s, color .15s; }
.sb-signout:hover { background: var(–red-bg); color: var(–red); border-color: var(–red); }

/* ===== MAIN CONTENT ===== */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
.topbar { display: flex; align-items: center; gap: 10px; padding: 0 18px; height: 56px; border-bottom: 1.5px solid var(–border); background: var(–bg2); flex-shrink: 0; }
.topbar-title { font-size: 1rem; font-weight: 800; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -0.3px; }
.topbar-pill { font-size: .68rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; background: var(–accent-bg); color: var(–accent); letter-spacing: .3px; }
.topbar-btn { background: none; border: 1.5px solid var(–border); cursor: pointer; color: var(–text2); padding: 6px 10px; border-radius: 8px; font-size: .78rem; font-weight: 700; display: flex; align-items: center; gap: 5px; transition: all .15s; font-family: inherit; }
.topbar-btn:hover { border-color: var(–accent); color: var(–accent); background: var(–accent-bg); }
.topbar-btn.primary { background: var(–accent); color: #fff; border-color: var(–accent); }
.topbar-btn.primary:hover { background: var(–accent2); }
.hamburger { display: none; background: none; border: none; cursor: pointer; color: var(–text2); font-size: 1.3rem; padding: 4px 6px; }

/* TAB NAV */
.tab-nav { display: flex; gap: 2px; padding: 10px 18px 0; border-bottom: 1.5px solid var(–border); background: var(–bg2); flex-shrink: 0; overflow-x: auto; }
.tab-btn { padding: 8px 14px; border: none; background: none; cursor: pointer; font-size: .8rem; font-weight: 700; color: var(–text3); border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; white-space: nowrap; transition: all .15s; font-family: inherit; display: flex; align-items: center; gap: 6px; border-radius: 8px 8px 0 0; }
.tab-btn:hover { color: var(–text); background: var(–bg3); }
.tab-btn.active { color: var(–accent); border-bottom-color: var(–accent); }
.tab-icon { font-size: .95rem; }

/* CONTENT AREA */
.content-area { flex: 1; overflow-y: auto; padding: 20px 18px; }

/* ===== EMPTY STATE ===== */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 12px; }
.empty-icon { font-size: 3rem; opacity: .5; }
.empty-title { font-size: 1.1rem; font-weight: 800; color: var(–text2); }
.empty-sub { font-size: .82rem; color: var(–text3); max-width: 320px; line-height: 1.6; }

/* ===== DASHBOARD ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card { background: var(–bg2); border: 1.5px solid var(–border); border-radius: var(–radius); padding: 18px 18px 16px; box-shadow: var(–card-shadow); position: relative; overflow: hidden; transition: transform .12s, box-shadow .12s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
.stat-card::after { content: “”; position: absolute; bottom: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; opacity: .12; }
.stat-card.purple { border-top: 3px solid var(–accent); }
.stat-card.purple::after { background: var(–accent); }
.stat-card.green { border-top: 3px solid var(–green); }
.stat-card.green::after { background: var(–green); }
.stat-card.amber { border-top: 3px solid var(–amber); }
.stat-card.amber::after { background: var(–amber); }
.stat-card.red { border-top: 3px solid var(–red); }
.stat-card.red::after { background: var(–red); }
.stat-card.pink { border-top: 3px solid var(–pink); }
.stat-card.pink::after { background: var(–pink); }
.stat-label { font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(–text3); margin-bottom: 6px; }
.stat-value { font-size: 2.2rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.stat-card.purple .stat-value { color: var(–accent); }
.stat-card.green .stat-value { color: var(–green); }
.stat-card.amber .stat-value { color: var(–amber); }
.stat-card.red .stat-value { color: var(–red); }
.stat-card.pink .stat-value { color: var(–pink); }
.stat-sub { font-size: .72rem; color: var(–text3); margin-top: 4px; font-weight: 600; }

/* Upcoming section */
.section-title { font-size: .75rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(–text3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: “”; flex: 1; height: 1.5px; background: var(–border); }

/* Countdown chips */
.countdown-grid { display: flex; flex-direction: column; gap: 8px; }
.countdown-item { background: var(–bg2); border: 1.5px solid var(–border); border-radius: var(–radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; box-shadow: var(–card-shadow); cursor: pointer; transition: all .15s; }
.countdown-item:hover { border-color: var(–accent); transform: translateX(2px); }
.countdown-icon { font-size: 1.3rem; width: 32px; text-align: center; flex-shrink: 0; }
.countdown-info { flex: 1; min-width: 0; }
.countdown-title { font-size: .85rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.countdown-meta { font-size: .72rem; color: var(–text3); font-weight: 600; margin-top: 2px; }
.countdown-badge { font-size: .72rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-overdue { background: var(–red-bg); color: var(–red); }
.badge-today { background: var(–amber-bg); color: var(–amber); }
.badge-soon { background: var(–cyan-bg); color: var(–cyan); }
.badge-upcoming { background: var(–accent-bg); color: var(–accent); }
.badge-done { background: var(–green-bg); color: var(–green); }

/* GPA display */
.gpa-card { background: linear-gradient(135deg, var(–accent) 0%, #a855f7 100%); border-radius: var(–radius); padding: 20px; color: #fff; margin-bottom: 22px; display: flex; align-items: center; gap: 16px; box-shadow: 0 6px 24px rgba(108,71,255,.3); }
.gpa-icon { font-size: 2.5rem; }
.gpa-info { flex: 1; }
.gpa-label { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; opacity: .8; margin-bottom: 2px; }
.gpa-value { font-size: 2.4rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.gpa-sub { font-size: .75rem; opacity: .8; font-weight: 600; margin-top: 2px; }

/* ===== ASSIGNMENT LIST ===== */
.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.filter-pill { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(–border); background: var(–bg2); color: var(–text3); font-size: .74rem; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
.filter-pill:hover { border-color: var(–accent); color: var(–accent); }
.filter-pill.active { background: var(–accent); color: #fff; border-color: var(–accent); box-shadow: 0 2px 8px rgba(108,71,255,.3); }
.filter-search { flex: 1; min-width: 150px; max-width: 280px; background: var(–bg2); border: 1.5px solid var(–border); border-radius: 10px; padding: 7px 12px; color: var(–text); font-size: .82rem; outline: none; font-family: inherit; }
.filter-search:focus { border-color: var(–accent); }

/* Assignment rows */
.assignment-list { display: flex; flex-direction: column; gap: 6px; }
.assignment-row { background: var(–bg2); border: 1.5px solid var(–border); border-radius: var(–radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .15s; box-shadow: var(–card-shadow); }
.assignment-row:hover { border-color: var(–accent); background: var(–bg3); }
.assignment-row.done-row { opacity: .65; }
.a-checkbox { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(–border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
.a-checkbox.checked { background: var(–green); border-color: var(–green); }
.a-checkbox.checked::after { content: “✓”; color: #fff; font-size: .75rem; font-weight: 800; }
.a-info { flex: 1; min-width: 0; }
.a-title { font-size: .87rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-meta { font-size: .72rem; color: var(–text3); margin-top: 2px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.a-course-tag { padding: 1px 7px; border-radius: 4px; font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; }
.a-type-tag { padding: 2px 8px; border-radius: 4px; font-size: .68rem; font-weight: 700; }
.type-assignment { background: var(–cyan-bg); color: var(–cyan); }
.type-exam { background: var(–red-bg); color: var(–red); }
.type-test { background: var(–amber-bg); color: var(–amber); }
.type-lab { background: var(–pink-bg); color: var(–pink); }
.type-project { background: var(–accent-bg); color: var(–accent); }
.type-quiz { background: var(–green-bg); color: var(–green); }
.a-due { font-size: .72rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.due-overdue { color: var(–red); }
.due-today { color: var(–amber); }
.due-soon { color: var(–cyan); }
.due-upcoming { color: var(–text3); }
.a-priority { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.prio-high { background: var(–red); }
.prio-med { background: var(–amber); }
.prio-low { background: var(–green); }

/* ===== CALENDAR ===== */
.cal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cal-month { font-size: 1.1rem; font-weight: 800; flex: 1; letter-spacing: -0.3px; }
.cal-nav { background: none; border: 1.5px solid var(–border); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; color: var(–text2); font-size: .9rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.cal-nav:hover { border-color: var(–accent); color: var(–accent); background: var(–accent-bg); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(–text4); padding: 6px 0; }
.cal-day { min-height: 80px; background: var(–bg2); border: 1.5px solid var(–border); border-radius: 8px; padding: 5px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; transition: border-color .15s; }
.cal-day:hover { border-color: var(–accent); }
.cal-day.today { border-color: var(–accent); background: var(–accent-bg); }
.cal-day.other-month { opacity: .4; }
.cal-drop-target { border-color: var(–accent) !important; background: var(–accent-bg) !important; transform: scale(1.02); transition: transform .1s; }
.cal-event { cursor: grab; user-select: none; transition: opacity .15s; }
.cal-event:active { cursor: grabbing; }
.cal-event-done { opacity: .6; text-decoration: line-through; }
.a-grade-inline { display:flex;align-items:center;gap:3px;flex-shrink:0;margin-right:10px; }
.grade-quick-input { width:58px;padding:4px 7px;border:1.5px solid var(–border);border-radius:8px;font-size:.8rem;font-weight:700;background:var(–bg3);color:var(–text1);font-family:inherit;text-align:center; }
.grade-quick-input:focus { outline:none;border-color:var(–accent);background:var(–bg2); }
.grade-quick-input.shake { animation:shake .4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes slideIn { from { transform: translateX(120%); opacity:0; } to { transform: translateX(0); opacity:1; } }
.a-checkbox.needs-grade { border-color:var(–amber);opacity:.45;cursor:not-allowed; }
.cal-day-num { font-size: .72rem; font-weight: 800; text-align: right; color: var(–text2); padding: 0 2px; }
.cal-day.today .cal-day-num { color: var(–accent); }
.cal-event { font-size: .62rem; font-weight: 700; padding: 2px 5px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3; }
.cal-more { font-size: .6rem; font-weight: 700; color: var(–text4); padding: 1px 3px; }

/* ===== GANTT ===== */
.gantt-wrap { overflow-x: auto; }
.gantt-table { width: 100%; min-width: 600px; border-collapse: separate; border-spacing: 0; }
.gantt-header-row { }
.gantt-header-row th { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(–text4); padding: 6px 8px; border-bottom: 1.5px solid var(–border); background: var(–bg2); position: sticky; top: 0; z-index: 2; }
.gantt-name-col { width: 200px; min-width: 200px; text-align: left; }
.gantt-week-col { min-width: 36px; text-align: center; }
.gantt-row td { padding: 4px 8px; border-bottom: 1px solid var(–border2); font-size: .8rem; vertical-align: middle; }
.gantt-course-row td { background: var(–bg3); font-weight: 800; font-size: .75rem; text-transform: uppercase; letter-spacing: .4px; color: var(–text2); }
.gantt-bar-cell { padding: 2px 4px !important; }
.gantt-bar { height: 20px; border-radius: 10px; display: block; opacity: .85; transition: opacity .15s; cursor: pointer; }
.gantt-bar:hover { opacity: 1; }
.gantt-today-line { border-right: 2px dashed var(–red); position: relative; }

/* ===== COURSE DETAIL ===== */
.course-header-card { background: var(–bg2); border: 1.5px solid var(–border); border-radius: var(–radius); padding: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; box-shadow: var(–card-shadow); }
.course-color-block { width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #fff; font-weight: 900; }
.course-header-info { flex: 1; min-width: 0; }
.course-header-code { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(–text3); }
.course-header-name { font-size: 1.1rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: -0.3px; }
.course-header-meta { font-size: .75rem; color: var(–text3); margin-top: 3px; font-weight: 600; }
.course-stats { display: flex; gap: 16px; align-items: center; flex-shrink: 0; }
.course-stat { text-align: center; }
.course-stat-val { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px; }
.course-stat-lbl { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(–text3); }
.progress-bar-wrap { background: var(–bg3); border-radius: 10px; height: 8px; overflow: hidden; margin-top: 8px; }
.progress-bar { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(–accent), var(–pink)); transition: width .5s ease; }

/* ===== MODALS ===== */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(–bg2); border: 1.5px solid var(–border); border-radius: 18px; padding: 24px; width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,.25); max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 1rem; font-weight: 800; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(–text3); padding: 2px 6px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: var(–bg3); color: var(–text); }

/* Form elements inside modals */
.flbl { display: block; font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(–text3); margin-bottom: 5px; }
.inp { width: 100%; background: var(–bg3); border: 1.5px solid var(–border); border-radius: 10px; padding: 9px 12px; color: var(–text); font-size: .87rem; outline: none; font-family: inherit; transition: border-color .15s; }
.inp:focus { border-color: var(–accent); background: var(–bg2); }
select.inp { cursor: pointer; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 10px; font-size: .82rem; font-weight: 700; cursor: pointer; border: none; transition: all .15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(–accent); color: #fff; box-shadow: 0 2px 8px rgba(108,71,255,.3); }
.btn-primary:hover { background: var(–accent2); transform: translateY(-1px); }
.btn-ghost { background: none; border: 1.5px solid var(–border); color: var(–text2); }
.btn-ghost:hover { border-color: var(–accent); color: var(–accent); background: var(–accent-bg); }
.btn-danger { background: var(–red); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-sm { padding: 5px 12px; font-size: .75rem; }

/* ===== TOAST ===== */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(–text); color: var(–bg); padding: 10px 20px; border-radius: 20px; font-size: .82rem; font-weight: 700; z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s; opacity: 0; white-space: nowrap; max-width: 90vw; box-shadow: 0 6px 20px rgba(0,0,0,.25); }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.error { background: var(–red); color: #fff; }
#toast.success { background: var(–green); color: #fff; }

/* ===== THEME TOGGLE ===== */
.theme-btn { background: none; border: 1.5px solid var(–border); cursor: pointer; color: var(–text2); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .9rem; transition: all .15s; }
.theme-btn:hover { border-color: var(–accent); color: var(–accent); background: var(–accent-bg); }

/* ===== NOTES ===== */
.notes-area { background: var(–bg2); border: 1.5px solid var(–border); border-radius: var(–radius); padding: 16px; font-size: .87rem; color: var(–text); line-height: 1.7; outline: none; width: 100%; min-height: 200px; font-family: “DM Mono”, monospace; resize: vertical; }
.notes-area:focus { border-color: var(–accent); }

/* ===== CONFETTI ===== */
@keyframes confettiFall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.confetti-piece { position: fixed; width: 10px; height: 10px; top: -20px; z-index: 9999; animation: confettiFall linear forwards; pointer-events: none; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
.sidebar { position: fixed; left: -280px; top: 0; bottom: 0; transition: left .25s ease, width .22s ease; z-index: 40; }
.sidebar.mobile-open { left: 0; }
.sidebar.collapsed { width: var(–sb-w); left: -280px; }
.sidebar.collapsed.mobile-open { left: 0; }
.hamburger { display: flex; }
.stat-grid { grid-template-columns: repeat(2, 1fr); }
.form-grid-2 { grid-template-columns: 1fr; }
.cal-grid { font-size: 11px; }
.cal-day { min-height: 60px; }
.tab-btn { padding: 8px 10px; font-size: .75rem; }
.course-stats { display: none; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn .25s ease forwards; }
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(108,71,255,.3); } 50% { box-shadow: 0 0 0 8px rgba(108,71,255,0); } }
.pulse { animation: pulseGlow 2s infinite; }

/* ===== COLOR SWATCHES for course picker ===== */
.color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.color-swatch { width: 28px; height: 28px; border-radius: 7px; cursor: pointer; transition: transform .15s; border: 2px solid transparent; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(–text); }

/* ===== BADGE CHIPS ===== */
.badge-chip {
display: inline-flex;
align-items: center;
gap: 10px;
padding: 10px 12px;
border-radius: 16px;
background: var(–bg2);
border: 1.5px solid var(–border);
box-shadow: var(–card-shadow);
transition: all .15s;
}
.badge-chip.is-earned {
border-color: var(–accent);
background: var(–accent-bg);
}
.badge-chip.is-locked { opacity: .42; filter: grayscale(.2); }
.badge-chip__mark {
width: 40px; height: 40px;
border-radius: 12px;
display: grid; place-items: center;
color: #fff;
flex: 0 0 auto;
}
.badge-chip__mark svg { width: 20px; height: 20px; }
.badge-chip[data-rarity=“common”]   .badge-chip__mark { background: linear-gradient(135deg,#a98cff,#7e58ff); }
.badge-chip[data-rarity=“uncommon”] .badge-chip__mark { background: linear-gradient(135deg,#8b7cff,#5d42f2); }
.badge-chip[data-rarity=“rare”]     .badge-chip__mark { background: linear-gradient(135deg,#9e74ff,#5632dd); }
.badge-chip[data-rarity=“epic”]     .badge-chip__mark { background: linear-gradient(135deg,#c084fc,#4a22cc); box-shadow:0 0 12px rgba(192,132,252,.5); }
.badge-chip__name { font-size: .78rem; font-weight: 800; color: var(–text); line-height: 1.1; }
.badge-chip.is-earned .badge-chip__name { color: var(–accent); }
.badge-chip__desc { font-size: .65rem; color: var(–text3); margin-top: 2px; line-height: 1.3; }
.badge-chip__xp  { font-size: .62rem; font-weight: 800; color: var(–accent2); margin-top: 2px; }
.badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 10px; }
.rarity-label { display: inline-block; font-size: .58rem; font-weight: 900; text-transform: uppercase; letter-spacing: .8px; padding: 2px 6px; border-radius: 6px; margin-top: 3px; }
.rarity-common   { background: var(–accent-bg); color: var(–accent); }

.rarity-rare     { background: var(–accent-bg); color: var(–accent2); }

  currentAuthTab = tab;
  document.querySelectorAll(".auth-tab").forEach(function(b, i) {
    b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
  });
  document.getElementById("name-row").style.display = tab === "signup" ? "block" : "none";

window.doAuth = async function() {
  var email = document.getElementById("auth-email").value.trim();
  var password = document.getElementById("auth-password").value;
  var name = document.getElementById("auth-name").value.trim();
  var msgEl = document.getElementById("auth-msg");
  msgEl.textContent = "";
  if (!email || !password) { msgEl.className = "auth-msg error"; msgEl.textContent = "Please fill in all fields."; return; }
  try {
    var result;
    if (currentAuthTab === "login") {
      result = await sb.auth.signInWithPassword({ email: email, password: password });
    } else {
      result = await sb.auth.signUp({ email: email, password: password, options: { data: { display_name: name || email.split("@")[0] } } });
    }
    if (result.error) throw result.error;
    if (currentAuthTab === "signup" && result.data && !result.data.session) {
      msgEl.className = "auth-msg success";
      msgEl.textContent = "Check your email to confirm your account!";
    }
  } catch (err) {
    msgEl.className = "auth-msg error";
    msgEl.textContent = err.message || "Authentication failed.";
  }
};

    ]);

    } catch(e) { userStats = null; }
    try {
      var habitsRes = await sb.from("habits").select("*").eq("user_id", currentUser.id).order("created_at");
      habits = (habitsRes && habitsRes.data) ? habitsRes.data : [];
      var today = new Date().toISOString().split("T")[0];
      var logsRes = await sb.from("habit_logs").select("*").eq("user_id", currentUser.id).eq("completed_date", today);
      habitLogs = (logsRes && logsRes.data) ? logsRes.data : [];
    } catch(e) { habits = []; habitLogs = []; }
    // Load badge IDs (non-blocking)
    try { await fetchUserBadgeIds(); } catch(e) { _unlockedBadgeIds = null; }

    // Restore last active semester
    var savedSemId = localStorage.getItem("celio-campus-sem-" + currentUser.id);
    if (savedSemId) {
      activeSemester = semesters.find(function(s) { return s.id === savedSemId; }) || null;
    }
    if (!activeSemester && semesters.length > 0) {
      activeSemester = semesters[semesters.length - 1];
    }
    renderSidebar();
    renderActiveTab();
  } catch (err) {
    showToast("Error loading data: " + err.message, "error");
  }
}

window.selectSemester = function(semId) {
  activeSemester = semesters.find(function(s) { return s.id === semId; }) || null;
  activeCourse = null;
  uiExpanded[semId] = true;
  if (currentUser) localStorage.setItem("celio-campus-sem-" + currentUser.id, semId);

window.selectCourse = function(courseId) {

// ===== HELPERS =====
function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  var d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  var now = new Date();
  now.setHours(0,0,0,0);
  var d = new Date(dateStr + "T00:00:00");
  return Math.round((d - now) / 86400000);
}

function getDueBadge(days, status) {
  if (status === "done") return { cls: "badge-done", text: "Done" };
  if (days === null) return { cls: "badge-upcoming", text: "No date" };
  if (days < 0) return { cls: "badge-overdue", text: Math.abs(days) + "d overdue" };
  if (days === 0) return { cls: "badge-today", text: "Due today!" };
  if (days <= 3) return { cls: "badge-soon", text: "In " + days + "d" };
  return { cls: "badge-upcoming", text: "In " + days + "d" };
}

function getDueClass(days, status) {
  if (status === "done") return "due-upcoming";
  if (days === null) return "due-upcoming";
  if (days < 0) return "due-overdue";
  if (days === 0) return "due-today";
  if (days <= 3) return "due-soon";
  return "due-upcoming";
}

function getSemAssignments() {
  if (!activeSemester) return [];
  var semCourseIds = courses.filter(function(c) { return c.semester_id === activeSemester.id; }).map(function(c) { return c.id; });
  return assignments.filter(function(a) { return semCourseIds.indexOf(a.course_id) > -1; });
}

function getCourseById(id) {
  return courses.find(function(c) { return c.id === id; }) || null;
}

function calculateGPA(semAssignments) {
  // Use weighted marks if available, fall back to null
  var graded = semAssignments.filter(function(a) {
    return a.marks_received != null && a.total_marks != null && a.total_marks > 0 && a.weight != null && a.weight > 0;
  });
  if (graded.length === 0) return null;
  var weightedScore = 0; var totalWeight = 0;
  graded.forEach(function(a) {
    weightedScore += (a.marks_received / a.total_marks) * a.weight;
    totalWeight += a.weight;
  });
  return totalWeight > 0 ? Math.round(weightedScore / totalWeight * 100) : null;
}

function renderAssignments() {

    if (assignFilter === "todo") return a.status === "todo";
    if (assignFilter === "inprogress") return a.status === "inprogress";
    if (assignFilter === "done") return a.status === "done";
    if (assignFilter === "overdue") return a.status !== "done" && daysUntil(a.due_date) < 0;
    if (assignFilter === "upcoming") { var d = daysUntil(a.due_date); return a.status !== "done" && d !== null && d >= 0 && d <= 7; }
    return true;
  }).filter(function(a) {

    var q = assignSearch.toLowerCase();

  html += '<div class="filter-bar">';
  ["all","todo","inprogress","done","overdue","upcoming"].forEach(function(f) {
    var labels = {all:"All",todo:"To Do",inprogress:"In Progress",done:"Done",overdue:"Overdue",upcoming:"This Week"};
    html += '<button class="filter-pill' + (assignFilter === f ? " active" : "") + '" onclick="setFilter(\'' + f + '\')">' + labels[f] + '</button>';
  });
  html += '<input class="filter-search" placeholder="Search..." value="' + esc(assignSearch) + '" oninput="setSearch(this.value)">';
  html += '</div>';

  if (filtered.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Nothing here</div><div class="empty-sub">No assignments match your filter. Try changing the filter or add a new one!</div></div>';
  } else {
    html += '<div class="assignment-list">';
    filtered.forEach(function(a) {
      var course = getCourseById(a.course_id);
      var days = daysUntil(a.due_date);
      var dueClass = getDueClass(days, a.status);
      var dueText = a.due_date ? formatDate(a.due_date) : "No date";
      if (days !== null && a.status !== "done") {
        if (days < 0) dueText += " (" + Math.abs(days) + "d late)";
        else if (days === 0) dueText = "Due today!";
        else if (days === 1) dueText += " (tomorrow)";
      }
      var hasGrade = a.marks_received != null && a.total_marks != null && a.total_marks > 0;
      var gradePct = hasGrade ? Math.round(a.marks_received / a.total_marks * 100) : null;
      var gradeColor = gradePct != null ? (gradePct >= 80 ? "var(--green)" : gradePct >= 60 ? "var(--amber)" : "var(--red)") : "var(--text3)";
      var needsGrade = a.total_marks != null && a.total_marks > 0 && !hasGrade && a.status !== "done";
      html += '<div class="assignment-row' + (a.status === "done" ? " done-row" : "") + '" onclick="openEditAssignment(\'' + a.id + '\')">';
      html += '<div class="a-checkbox' + (a.status === "done" ? " checked" : (needsGrade ? " needs-grade" : "")) + '" title="' + (needsGrade ? "Enter marks first" : "") + '" onclick="toggleDone(event,\'' + a.id + '\')"></div>';
      html += '<div class="a-info">';
      html += '<div class="a-title" style="' + (a.status === "done" ? "text-decoration:line-through;opacity:.6" : "") + '">' + esc(a.title) + '</div>';
      html += '<div class="a-meta">';
      if (course) html += '<span class="a-course-tag" style="background:' + (course.color||"#6c47ff") + '22;color:' + (course.color||"#6c47ff") + '">' + esc(course.code) + '</span>';
      html += '<span class="a-type-tag type-' + (a.type||"assignment") + '">' + (TYPE_EMOJI[a.type]||"📝") + ' ' + (a.type||"assignment") + '</span>';
      if (a.weight) html += '<span style="font-size:.68rem;color:var(--text3);font-weight:700">' + a.weight + '% weight</span>';
      html += '</div></div>';
      if (a.total_marks != null && a.total_marks > 0) {
        html += '<div class="a-grade-inline" onclick="event.stopPropagation()">';
        if (hasGrade) {
          html += '<span style="font-size:.9rem;font-weight:900;color:' + gradeColor + '">' + gradePct + '%</span>';
          html += '<span style="font-size:.68rem;color:var(--text3);margin-left:4px">' + a.marks_received + '/' + a.total_marks + '</span>';
        } else {
          html += '<input class="grade-quick-input" type="number" min="0" max="' + a.total_marks + '" step="0.5" placeholder="Score" title="Enter marks out of ' + a.total_marks + '" onchange="saveInlineGrade(event,\'' + a.id + '\',' + a.total_marks + ')" onkeydown="if(event.key===\'Enter\'){saveInlineGrade(event,\'' + a.id + '\',' + a.total_marks + ');this.blur()}" onclick="event.stopPropagation()">';
          html += '<span style="font-size:.68rem;color:var(--text3);font-weight:700;margin-left:3px">/ ' + a.total_marks + '</span>';
        }
        html += '</div>';
      }
      html += '<div class="' + dueClass + ' a-due">' + dueText + '</div>';
      html += '<div class="a-priority prio-' + (a.priority||"med") + '"></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';
  ca.innerHTML = html;
}

window.setFilter = function(f) { assignFilter = f; renderAssignments(); };
window.setSearch = function(v) { assignSearch = v; renderAssignments(); };

window.saveInlineGrade = async function(e, id, totalMarks) {
  var val = parseFloat(e.target.value);
  if (isNaN(val) || e.target.value === "") return;
  if (val < 0) val = 0;
  if (val > totalMarks) val = totalMarks;
  var a = assignments.find(function(x) { return x.id === id; });
  if (!a) return;
  a.marks_received = val; // update memory immediately so checkbox works right away
  try {
    var res = await sb.from("assignments").update({ marks_received: val }).eq("id", id);
    if (res.error) throw res.error;
    renderAssignments(); // re-render after confirmed save to show % badge
  } catch(err) {
    a.marks_received = null;
    showToast(err.message, "error");
  }
};

window.toggleDone = async function(e, id) {
  e.stopPropagation();
  var a = assignments.find(function(x) { return x.id === id; });
  if (!a) return;
  // Block completion if total_marks set but no marks_received
  if (a.status !== "done" && a.total_marks != null && a.total_marks > 0 && (a.marks_received == null)) {
    showToast("Enter your score first! ✏️", "error");
    // Shake the grade input
    var input = document.querySelector('[data-id="' + id + '"] .grade-quick-input, .assignment-row .grade-quick-input');
    var rows = document.querySelectorAll(".assignment-row");
    rows.forEach(function(row) {
      var cb = row.querySelector(".a-checkbox");
      if (cb && cb.getAttribute("onclick") && cb.getAttribute("onclick").includes(id)) {
        var gi = row.querySelector(".grade-quick-input");
        if (gi) { gi.classList.add("shake"); gi.focus(); setTimeout(function() { gi.classList.remove("shake"); }, 500); }
      }
    });
    return;
  }
  var newStatus = a.status === "done" ? "todo" : "done";
  try {
    var res = await sb.from("assignments").update({ status: newStatus }).eq("id", id);
    if (res.error) throw res.error;
    a.status = newStatus;
    if (newStatus === "done") {
      launchConfetti();
      awardXP(a);
    } else {
      deductXP(a);
    }
    renderActiveTab();
  } catch (err) { showToast(err.message, "error"); }
};

async function ensureStats() {
  if (userStats) return userStats;
  var res = await sb.from("user_stats").insert({
    user_id: currentUser.id, xp: 0, streak: 0, badges: []
  }).select().single();
  if (res.error) throw res.error;
  userStats = res.data;
  return userStats;
}

// ===== BADGE SYSTEM =====
var _unlockedBadgeIds = null; // in-memory cache

async function fetchUserBadgeIds() {
  var res = await sb.from("user_badges").select("badge_id").eq("user_id", currentUser.id);
  if (res.error) { console.warn("fetchUserBadgeIds:", res.error); return new Set(); }
  _unlockedBadgeIds = new Set((res.data || []).map(function(x) { return x.badge_id; }));
  return _unlockedBadgeIds;
}

async function grantBadge(badgeId) {
  var res = await sb.rpc("unlock_badge", { p_user_id: currentUser.id, p_badge_id: badgeId, p_context: {} });
  if (res.error) { console.warn("grantBadge", badgeId, res.error); return false; }
  if (!res.data) return false; // already had it
  if (_unlockedBadgeIds) _unlockedBadgeIds.add(badgeId);
  // Show badge toast
  var bdef = BADGE_DEFS.find(function(b) { return b.id === badgeId; });
  if (bdef) {
    // Re-fetch XP in case unlock_badge updated it
    var sr = await sb.from("user_stats").select("*").eq("user_id", currentUser.id).single();
    if (sr.data) userStats = sr.data;
    setTimeout(function() {
      showBadgeToast({ icon: "🏅", name: bdef.name, desc: bdef.desc + " · +" + bdef.xpBonus + " XP" });
      if (activeTab === "dashboard") renderDashboard();
    }, 600);
  }
  return true;
}

function sameLocalDay(dateLike, refDate) {
  var d = new Date(dateLike);
  return d.getFullYear() === refDate.getFullYear() &&
         d.getMonth() === refDate.getMonth() &&
         d.getDate() === refDate.getDate();
}

function getLevelIndex(xp) {
  var idx = 0;
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) { idx = i + 1; break; }
  }
  return idx; // 1-based (Freshman=1, Sophomore=2, …)
}

async function evaluateBadges(context) {
  // context = { trigger: "assignment"|"habit"|"semester"|"course"|"xp", data: {} }
  try {
    var unlocked = _unlockedBadgeIds || await fetchUserBadgeIds();
    var xp = (userStats && userStats.xp) || 0;
    var streak = (userStats && userStats.streak) || 0;
    var levelIdx = getLevelIndex(xp);
    var now = new Date();
    var hour = now.getHours();
    var dow = now.getDay(); // 0=Sun, 6=Sat

    // --- Productivity ---
    var allDone = assignments.filter(function(a) { return a.status === "done"; });
    var doneCount = allDone.length;
    var doneToday = allDone.filter(function(a) { return a.updated_at && sameLocalDay(a.updated_at, now); }).length;

    if (doneCount >= 1   && !unlocked.has("first_step"))     await grantBadge("first_step");
    if (doneToday >= 3   && !unlocked.has("momentum"))       await grantBadge("momentum");
    if (doneToday >= 5   && !unlocked.has("speed_runner"))   await grantBadge("speed_runner");
    if (doneCount >= 10  && !unlocked.has("focused_finish")) await grantBadge("focused_finish");
    if (doneCount >= 25  && !unlocked.has("task_titan"))     await grantBadge("task_titan");
    if (doneCount >= 100 && !unlocked.has("legend"))         await grantBadge("legend");

    // Timing badges (triggered on assignment completion)
    if (context && context.trigger === "assignment") {
      if (hour < 8  && !unlocked.has("early_bird"))       await grantBadge("early_bird");
      if (hour >= 0 && hour < 3 && !unlocked.has("night_owl")) await grantBadge("night_owl");
      // Weekend warrior — count done on weekend days (rough: use doneCount proxy)
      if ((dow === 0 || dow === 6) && !unlocked.has("weekend_warrior")) {
        // We grant this after 5 weekend completions — approximate with doneCount
        var wkRes = await sb.from("assignments").select("id,updated_at").eq("user_id", currentUser.id).eq("status","done");
        if (!wkRes.error) {
          var wkCount = (wkRes.data || []).filter(function(a) {
            if (!a.updated_at) return false;
            var d = new Date(a.updated_at).getDay();
            return d === 0 || d === 6;
          }).length;
          if (wkCount >= 5) await grantBadge("weekend_warrior");
        }
      }
    }

    // --- Streaks ---
    if (streak >= 5  && !unlocked.has("on_fire"))          await grantBadge("on_fire");
    if (streak >= 10 && !unlocked.has("relentless"))        await grantBadge("relentless");
    if (streak >= 30 && !unlocked.has("unstoppable"))       await grantBadge("unstoppable");
    if (streak >= 60 && !unlocked.has("semester_ironman"))  await grantBadge("semester_ironman");

    // --- Habits ---
    // routine_builder, consistency_king, discipline_mode: checked in toggleHabit based on habit streak
    var habRes = await sb.from("habits").select("id",{count:"exact",head:true}).eq("user_id", currentUser.id);
    if (!habRes.error && habRes.count >= 5 && !unlocked.has("habit_garden")) await grantBadge("habit_garden");

    // --- Setup ---
    if (semesters.length >= 1 && !unlocked.has("semester_architect")) await grantBadge("semester_architect");
    if (courses.length >= 1   && !unlocked.has("course_starter"))     await grantBadge("course_starter");
    if (assignments.length >= 20 && !unlocked.has("planner_mode"))    await grantBadge("planner_mode");

    // Full Load: 5 courses in one semester
    if (!unlocked.has("full_load") && activeSemester) {
      var semCourses = courses.filter(function(c) { return c.semester_id === activeSemester.id; });
      if (semCourses.length >= 5) await grantBadge("full_load");
    }

    // Organized Mind: 10 assignments with notes
    if (!unlocked.has("organized_mind")) {
      var withNotes = assignments.filter(function(a) { return a.notes && a.notes.trim().length > 0; }).length;
      if (withNotes >= 10) await grantBadge("organized_mind");
    }

    // Course Master: all assignments done in any course
    if (!unlocked.has("course_master")) {
      var completedCourses = 0;
      courses.forEach(function(c) {
        var ca = assignments.filter(function(a) { return a.course_id === c.id; });
        if (ca.length > 0 && ca.every(function(a) { return a.status === "done"; })) completedCourses++;
      });
      if (completedCourses >= 1) await grantBadge("course_master");
      if (completedCourses >= 2 && !unlocked.has("double_major")) await grantBadge("double_major");
    }

    // Final Boss: all assignments in semester done
    if (!unlocked.has("final_boss") && activeSemester) {
      var semA = assignments.filter(function(a) {
        var c = courses.find(function(c2) { return c2.id === a.course_id; });
        return c && c.semester_id === activeSemester.id;
      });
      if (semA.length > 0 && semA.every(function(a) { return a.status === "done"; })) await grantBadge("final_boss");
    }

    // --- Milestones (level) ---
    if (levelIdx >= 2  && !unlocked.has("level_up"))    await grantBadge("level_up");
    if (levelIdx >= 5  && !unlocked.has("scholar"))     await grantBadge("scholar");
    if (levelIdx >= 7  && !unlocked.has("grandmaster")) await grantBadge("grandmaster");

  } catch(err) { console.warn("evaluateBadges:", err); }
}

async function awardXP(assignment) {
  try {
    var stats = await ensureStats();
    var xpGain = XP_VALUES[assignment.type] || 20;
    // Bonus XP for grade
    if (assignment.marks_received != null && assignment.total_marks > 0) {
      var pct = assignment.marks_received / assignment.total_marks * 100;
      if (pct >= 90) xpGain += XP_GRADE_A;
      else if (pct >= 80) xpGain += XP_GRADE_B;
    }
    var today = new Date().toISOString().split("T")[0];
    var yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];
    var lastDate = stats.last_completion_date;
    var newStreak = stats.streak || 0;
    if (lastDate === today) { /* same day */ }
    else if (lastDate === yesterday) { newStreak++; }
    else { newStreak = 1; }
    var newXP = (stats.xp || 0) + xpGain;
    var oldLevel = getLevel(stats.xp || 0);
    var newLevel = getLevel(newXP);
    var updates = { xp: newXP, streak: newStreak, last_completion_date: today };
    var upRes = await sb.from("user_stats").update(updates).eq("user_id", currentUser.id);
    if (upRes.error) throw upRes.error;
    userStats = Object.assign({}, stats, updates);
    // Toast: XP gain
    var msg = "+" + xpGain + " XP";
    if (newLevel.name !== oldLevel.name) {
      setTimeout(function() {
        showBadgeToast({ icon: newLevel.icon, name: "Level Up! " + newLevel.name, desc: "You reached " + newLevel.name + " · " + newXP + " XP total" });
      }, 500);
      if (activeTab === "dashboard") renderDashboard();
    } else if (newStreak > 1) {
      msg += " · " + newStreak + " day streak! 🔥";
    }
    showToast(msg, "success");
    // Evaluate badges after XP settled
    evaluateBadges({ trigger: "assignment", data: { assignment: assignment } });
  } catch(err) { console.warn("XP error:", err); }
}

window.toggleBadgesPanel = function() {

  renderDashboard();
};

function showBadgeToast(badge) {
  var container = document.getElementById("toast-container");
  if (!container) return;
  var el = document.createElement("div");
  el.style.cssText = "background:linear-gradient(135deg,#6c47ff,#ec4899);color:#fff;padding:12px 18px;border-radius:14px;box-shadow:0 6px 24px rgba(108,71,255,.4);display:flex;align-items:center;gap:10px;font-family:inherit;animation:slideIn .3s ease;max-width:280px;";
  el.innerHTML = '<div style="font-size:1.8rem">' + badge.icon + '</div><div><div style="font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.85">Badge Unlocked!</div><div style="font-size:.95rem;font-weight:900">' + badge.name + '</div><div style="font-size:.7rem;opacity:.8;margin-top:1px">' + badge.desc + '</div></div>';
  container.appendChild(el);
  setTimeout(function() { el.style.opacity = "0"; el.style.transition = "opacity .4s"; setTimeout(function() { el.remove(); }, 400); }, 4000);
}

async function deductXP(assignment) {
  try {
    if (!userStats) return;
    var xpLoss = XP_VALUES[assignment.type] || 20;
    var newXP = Math.max(0, (userStats.xp || 0) - xpLoss);
    await sb.from("user_stats").update({ xp: newXP }).eq("user_id", currentUser.id);
    userStats = Object.assign({}, userStats, { xp: newXP });
    showToast("-" + xpLoss + " XP");
  } catch(err) { console.warn("XP deduct error:", err); }
}

// ===== CONFETTI =====
function launchConfetti() {
  var colors = ["#6c47ff","#ec4899","#f59e0b","#22c55e","#06b6d4","#ef4444"];
  for (var i = 0; i < 30; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement("div");
        el.className = "confetti-piece";
        el.style.left = Math.random() * 100 + "vw";

        el.style.height = (Math.random() * 8 + 6) + "px";

        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
      }, i * 40);

}

// ===== RENDER CALENDAR =====
var calDragId = null;

function renderCalendar() {
  var ca = document.getElementById("content-area");
  var semA = getSemAssignments();
  var year = calViewDate.getFullYear();
  var month = calViewDate.getMonth();
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var today = new Date();
  today.setHours(0,0,0,0);
  var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  var html = '<div class="fade-in">';
  html += '<div class="cal-header">';
  html += '<button class="cal-nav" onclick="calNav(-1)">◀</button>';
  html += '<div class="cal-month">' + monthNames[month] + ' ' + year + '</div>';
  html += '<button class="cal-nav" onclick="calNav(1)">▶</button>';
  html += '<button class="btn btn-ghost btn-sm" onclick="calToday()">Today</button>';
  html += '</div>';
  html += '<div class="cal-grid">';
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(function(d) {
    html += '<div class="cal-dow">' + d + '</div>';
  });

  // blank cells before first day
  for (var i = 0; i < firstDay; i++) {
    html += '<div class="cal-day other-month"><div class="cal-day-num">' + (new Date(year, month, -firstDay + i + 1).getDate()) + '</div></div>';
  }

  for (var day = 1; day <= daysInMonth; day++) {
    var d = new Date(year, month, day);
    d.setHours(0,0,0,0);
    var isToday = d.getTime() === today.getTime();
    var dateStr = year + "-" + String(month+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
    var dayAssigns = semA.filter(function(a) { return a.due_date === dateStr; });
    html += '<div class="cal-day' + (isToday ? " today" : "") + '" data-date="' + dateStr + '" ondragover="calDragOver(event)" ondragleave="calDragLeave(event)" ondrop="calDrop(event,\'' + dateStr + '\')">';
    html += '<div class="cal-day-num">' + day + '</div>';
    var shown = 0;
    dayAssigns.forEach(function(a) {
      if (shown >= 3) return;
      shown++;
      var course = getCourseById(a.course_id);
      var color = (course && course.color) || "#6c47ff";
      var isDone = a.status === "done";
      html += '<div class="cal-event' + (isDone ? " cal-event-done" : "") + '" draggable="true" data-id="' + a.id + '" style="background:' + color + '22;color:' + color + ';border-left:3px solid ' + color + '" ondragstart="calDragStart(event,\'' + a.id + '\')" onclick="event.stopPropagation();openEditAssignment(\'' + a.id + '\')">' + (isDone ? "✓ " : "") + esc(a.title) + '</div>';
    });
    if (dayAssigns.length > 3) html += '<div class="cal-more">+' + (dayAssigns.length-3) + ' more</div>';
    html += '</div>';
  }

  // trailing blank cells
  var total = firstDay + daysInMonth;
  var trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (var t = 1; t <= trailing; t++) {
    html += '<div class="cal-day other-month"><div class="cal-day-num">' + t + '</div></div>';
  }

  html += '</div></div>';
  ca.innerHTML = html;
}

window.calNav = function(dir) {
  calViewDate.setMonth(calViewDate.getMonth() + dir);
  renderCalendar();
};
window.calToday = function() {
  calViewDate = new Date();
  renderCalendar();
};
window.calDragStart = function(e, id) {
  calDragId = id;
  e.dataTransfer.effectAllowed = "move";
  e.target.style.opacity = "0.4";
};
window.calDragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  var cell = e.currentTarget;
  if (!cell.classList.contains("other-month")) {
    cell.classList.add("cal-drop-target");
  }
};
window.calDragLeave = function(e) {
  e.currentTarget.classList.remove("cal-drop-target");
};
window.calDrop = async function(e, dateStr) {
  e.preventDefault();
  e.currentTarget.classList.remove("cal-drop-target");
  if (!calDragId) return;
  var id = calDragId;
  calDragId = null;
  var a = assignments.find(function(x) { return x.id === id; });
  if (!a || a.due_date === dateStr) return;
  try {
    var res = await sb.from("assignments").update({ due_date: dateStr }).eq("id", id);
    if (res.error) throw res.error;
    a.due_date = dateStr;
    renderCalendar();
    showToast("Moved to " + formatDate(dateStr) + " ✅", "success");
  } catch(err) {
    showToast(err.message, "error");
    renderCalendar();
  }
};

// ===== RENDER GANTT =====
function renderGantt() {
  var ca = document.getElementById("content-area");
  if (!activeSemester || !activeSemester.start_date || !activeSemester.end_date) {
    ca.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Set semester dates</div><div class="empty-sub">Add start and end dates to your semester to see the timeline view.</div></div>';
    return;
  }

  var start = new Date(activeSemester.start_date + "T00:00:00");
  var end = new Date(activeSemester.end_date + "T00:00:00");
  var totalDays = Math.ceil((end - start) / 86400000) + 1;
  var semCourses = courses.filter(function(c) { return c.semester_id === activeSemester.id; });
  var semA = getSemAssignments();
  var today = new Date(); today.setHours(0,0,0,0);
  var todayOffset = Math.ceil((today - start) / 86400000);

  // Build week columns
  var weeks = [];
  var weekMs = 7 * 86400000;
  var numWeeks = Math.ceil(totalDays / 7);
  for (var w = 0; w < numWeeks; w++) {
    var wStart = new Date(start.getTime() + w * weekMs);
    weeks.push("W" + (w+1));
  }

  var html = '<div class="fade-in"><div class="gantt-wrap">';
  html += '<table class="gantt-table"><thead><tr class="gantt-header-row">';
  html += '<th class="gantt-name-col">Assignment</th>';
  weeks.forEach(function(w, i) {
    var isTodayWeek = todayOffset >= i*7 && todayOffset < (i+1)*7;
    html += '<th class="gantt-week-col' + (isTodayWeek ? " gantt-today-line" : "") + '">' + w + '</th>';
  });
  html += '</tr></thead><tbody>';

  semCourses.forEach(function(course) {
    var cAssigns = semA.filter(function(a) { return a.course_id === course.id; });
    if (cAssigns.length === 0) return;
    html += '<tr class="gantt-row gantt-course-row"><td colspan="' + (numWeeks+1) + '" style="color:' + (course.color||"var(--accent)") + ';padding-left:12px">' + esc(course.code) + ' — ' + esc(course.name) + '</td></tr>';
    cAssigns.forEach(function(a) {
      if (!a.due_date) return;
      var dueDate = new Date(a.due_date + "T00:00:00");
      var dayOffset = Math.ceil((dueDate - start) / 86400000);
      var weekIndex = Math.floor(dayOffset / 7);
      weekIndex = Math.max(0, Math.min(numWeeks-1, weekIndex));
      html += '<tr class="gantt-row">';
      html += '<td style="font-size:.78rem;font-weight:700;padding-left:16px;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">';
      html += '<span class="a-type-tag type-' + (a.type||"assignment") + '" style="margin-right:4px">' + (TYPE_EMOJI[a.type]||"📝") + '</span>' + esc(a.title);
      html += '</td>';
      weeks.forEach(function(w, i) {
        if (i === weekIndex) {
          var color = a.status === "done" ? "#22c55e" : (course.color || "#6c47ff");
          html += '<td class="gantt-bar-cell" onclick="openEditAssignment(\'' + a.id + '\')">';
          html += '<div class="gantt-bar" style="background:' + color + ';width:85%;margin:0 auto" title="' + esc(a.title) + '"></div>';
          html += '</td>';
        } else {
          html += '<td></td>';
        }
      });
      html += '</tr>';
    });
  });

  html += '</tbody></table></div></div>';
  ca.innerHTML = html;
}

      html += '<div style="display:flex;gap:10px;font-size:.75rem;font-weight:700;margin-bottom:10px">';
      html += '<span style="color:var(--green)">✅ ' + cdone + ' done</span>';
      html += '<span style="color:var(--text3)">📝 ' + cA.length + ' total</span>';
      if (coverdue > 0) html += '<span style="color:var(--red)">⚠️ ' + coverdue + ' overdue</span>';
      html += '</div>';
      html += '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + cpct + '%;background:' + (course.color||"var(--accent)") + '"></div></div>';
      html += '<div style="text-align:right;font-size:.7rem;font-weight:800;color:' + (course.color||"var(--accent)") + ';margin-top:4px">' + cpct + '%</div>';

window.updateGradeCalc = function() {
  var marks = parseFloat(document.getElementById("a-marks-received").value);
  var total = parseFloat(document.getElementById("a-total-marks").value);
  var weight = parseFloat(document.getElementById("a-weight").value);
  var el = document.getElementById("a-grade-calc");
  if (!el) return;
  if (!isNaN(marks) && !isNaN(total) && total > 0) {
    var pct = Math.round(marks / total * 100);
    var contribution = (!isNaN(weight) && weight > 0) ? (marks / total * weight).toFixed(1) : null;
    var color = pct >= 80 ? "var(--green)" : pct >= 60 ? "var(--amber)" : "var(--red)";
    el.innerHTML = '<div style="background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;width:100%">'
      + '<div style="font-size:1.1rem;font-weight:900;color:' + color + '">' + pct + '%</div>'
      + (contribution ? '<div style="font-size:.7rem;color:var(--text3);font-weight:700">Contributes ' + contribution + '% to course</div>' : '')
      + '</div>';
  } else {
    el.innerHTML = "";
  }
};

function calculateCourseGrade(courseId) {
  var courseAssignments = assignments.filter(function(a) {
    return a.course_id === courseId && a.marks_received != null && a.total_marks != null && a.total_marks > 0 && a.weight != null && a.weight > 0;
  });
  if (courseAssignments.length === 0) return null;
  var totalWeight = 0;
  var weightedScore = 0;
  courseAssignments.forEach(function(a) {
    var pct = a.marks_received / a.total_marks;
    weightedScore += pct * a.weight;
    totalWeight += a.weight;
  });
  if (totalWeight === 0) return null;
  return {
    grade: Math.round(weightedScore / totalWeight * 100),
    weightCovered: Math.round(totalWeight)
  };
}

      html += '</div>';
      // Edit button
      html += '<button onclick="openEditHabitModal(\'' + h.id + '\')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:.8rem;padding:4px 8px;border-radius:6px;font-family:inherit;font-weight:700" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'none\'">Edit</button>';
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="empty-state"><div class="empty-icon">🔥</div><div class="empty-title">No habits yet</div><div class="empty-sub">Build daily study habits to stay on track and earn XP!</div></div>';
  }

  html += '</div>';
  ca.innerHTML = html;

  // Load streaks async after render
  habits.forEach(function(h) { loadHabitStreak(h.id); });
}

async function loadHabitStreak(habitId) {
  try {
    var res = await sb.from("habit_logs").select("completed_date").eq("habit_id", habitId).order("completed_date", { ascending: false }).limit(60);
    var logs = (res && res.data) ? res.data.map(function(l) { return l.completed_date; }) : [];
    var streak = 0;
    var d = new Date();
    d.setHours(0,0,0,0);
    // Check from today or yesterday
    var todayStr = d.toISOString().split("T")[0];
    var checkDate = new Date(d);
    if (logs.indexOf(todayStr) === -1) checkDate.setDate(checkDate.getDate() - 1);
    while (true) {
      var ds = checkDate.toISOString().split("T")[0];
      if (logs.indexOf(ds) > -1) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
      else break;
    }
    var el = document.getElementById("streak-" + habitId);
    if (el) el.textContent = streak > 0 ? "🔥 " + streak + " day streak" : "Start your streak today!";
  } catch(e) {}
}

window.toggleHabit = async function(e, habitId) {
  e.stopPropagation();
  var today = new Date().toISOString().split("T")[0];
  var idx = habitLogs.findIndex(function(l) { return l.habit_id === habitId; });
  var isDone = idx > -1;
  try {
    if (isDone) {
      // Un-complete
      await sb.from("habit_logs").delete().eq("habit_id", habitId).eq("completed_date", today);
      habitLogs.splice(idx, 1);
      // Deduct XP
      if (userStats) {
        var newXP = Math.max(0, (userStats.xp || 0) - 10);
        await sb.from("user_stats").update({ xp: newXP }).eq("user_id", currentUser.id);
        userStats = Object.assign({}, userStats, { xp: newXP });
        showToast("-10 XP");
      }
    } else {
      // Complete
      var res = await sb.from("habit_logs").insert({ habit_id: habitId, completed_date: today, user_id: currentUser.id }).select().single();
      if (res.error) throw res.error;
      habitLogs.push(res.data);
      // Award XP
      try { await awardHabitXP(habitId); } catch(xe) {}
    }
    renderHabits();
  } catch(err) { showToast(err.message, "error"); }
};

async function awardHabitXP(habitId) {
  var stats = await ensureStats();
  var today = new Date().toISOString().split("T")[0];
  var yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];
  var lastDate = stats.last_completion_date;
  var newStreak = stats.streak || 0;
  if (lastDate === yesterday) newStreak++;
  else if (lastDate !== today) newStreak = 1;
  var newXP = (stats.xp || 0) + 10;
  var oldLevel = getLevel(stats.xp || 0);
  var newLevel = getLevel(newXP);
  await sb.from("user_stats").update({ xp: newXP, streak: newStreak, last_completion_date: today }).eq("user_id", currentUser.id);
  userStats = Object.assign({}, stats, { xp: newXP, streak: newStreak, last_completion_date: today });
  var msg = "+10 XP";
  if (newLevel.name !== oldLevel.name) msg += " · Level up! " + newLevel.icon + " " + newLevel.name;
  else if (newStreak > 1) msg += " · " + newStreak + " day streak! 🔥";
  showToast(msg, "success");
  // Check habit streak badges for this specific habit
  try {
    var logRes = await sb.from("habit_logs").select("completed_date").eq("habit_id", habitId).order("completed_date", {ascending: false}).limit(31);
    if (!logRes.error && logRes.data) {
      var dates = logRes.data.map(function(l) { return l.completed_date; });
      var streak2 = 0;
      var cursor = new Date(); cursor.setHours(0,0,0,0);
      for (var i = 0; i < dates.length; i++) {
        var d = new Date(dates[i]); d.setHours(0,0,0,0);
        if (d.getTime() === cursor.getTime()) { streak2++; cursor.setDate(cursor.getDate()-1); }
        else break;
      }
      var unlocked2 = _unlockedBadgeIds || await fetchUserBadgeIds();
      if (streak2 >= 3  && !unlocked2.has("routine_builder"))  await grantBadge("routine_builder");
      if (streak2 >= 7  && !unlocked2.has("consistency_king")) await grantBadge("consistency_king");
      if (streak2 >= 30 && !unlocked2.has("discipline_mode"))  await grantBadge("discipline_mode");
    }
  } catch(be) { console.warn("habit badge check:", be); }
  evaluateBadges({ trigger: "habit" });
}

// Habit modal
var HABIT_ICONS = [
  "🧘","🏃","📖","✍️","💧","🥗","😴","🧠","🎵","🌿",
  "🌅","🙏","💪","🎯","📝","🌊","🔥","⭐","💡","🎨",
  "🧹","📵","🥤","🫁","🌙","☀️","🤸","📚","✅","💬"
];

function populateHabitIconPicker(selected) {
  var el = document.getElementById("h-icon-picker");
  if (!el) return;
  el.innerHTML = "";
  HABIT_ICONS.forEach(function(icon) {
    var btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = icon;
    btn.title = icon;
    btn.style.cssText = "width:36px;height:36px;border-radius:8px;border:2px solid " + (icon === selected ? "var(--accent)" : "var(--border)") + ";background:" + (icon === selected ? "var(--accent-bg)" : "var(--bg3)") + ";cursor:pointer;font-size:1.1rem;transition:all .12s;";
    btn.onclick = function() {
      document.getElementById("h-icon").value = icon;
      document.querySelectorAll("#h-icon-picker button").forEach(function(b) {
        b.style.borderColor = "var(--border)";
        b.style.background = "var(--bg3)";
      });
      btn.style.borderColor = "var(--accent)";
      btn.style.background = "var(--accent-bg)";
    };
    el.appendChild(btn);
  });
}

function populateHabitColorPicker(selected) {
  var el = document.getElementById("h-color-picker");
  if (!el) return;
  el.innerHTML = "";
  HABIT_COLORS.forEach(function(c) {
    var s = document.createElement("div");
    s.className = "color-swatch" + (c === selected ? " selected" : "");
    s.style.background = c;
    s.setAttribute("data-color", c);
    s.onclick = function() {
      document.querySelectorAll("#h-color-picker .color-swatch").forEach(function(x) { x.classList.remove("selected"); });
      s.classList.add("selected");
    };
    el.appendChild(s);
  });
}

window.topbarAdd = function() {
  if (activeTab === "habits") { openAddHabitModal(); }
  else if (activeTab === "courses") { openAddCourseModal(null, activeSemester ? activeSemester.id : null); }
  else { openAddAssignmentModal(); }
};

window.openAddHabitModal = function() {
  editingHabitId = null;
  document.getElementById("habit-modal-title").textContent = "New Habit";
  document.getElementById("h-name").value = "";
  document.getElementById("h-notes").value = "";
  document.getElementById("h-icon").value = "🧘";
  document.getElementById("habit-delete-btn").style.display = "none";
  populateHabitIconPicker("🧘");
  populateHabitColorPicker("#6c47ff");
  document.getElementById("habit-modal").classList.add("open");
};

window.openEditHabitModal = function(id) {
  var h = habits.find(function(x) { return x.id === id; });
  if (!h) return;
  editingHabitId = id;
  document.getElementById("habit-modal-title").textContent = "Edit Habit";
  document.getElementById("h-name").value = h.name || "";
  document.getElementById("h-notes").value = h.notes || "";
  document.getElementById("h-icon").value = h.icon || "🧘";
  populateHabitIconPicker(h.icon || "🧘");
  document.getElementById("habit-delete-btn").style.display = "inline-flex";
  populateHabitColorPicker(h.color || "#6c47ff");
  document.getElementById("habit-modal").classList.add("open");
};

window.closeHabitModal = function() {
  document.getElementById("habit-modal").classList.remove("open");
};

window.saveHabit = async function() {
  var name = document.getElementById("h-name").value.trim();
  if (!name) { showToast("Habit name is required", "error"); return; }
  var icon = document.getElementById("h-icon").value.trim() || "⭐";
  var colorEl = document.querySelector("#h-color-picker .color-swatch.selected");
  var color = colorEl ? colorEl.getAttribute("data-color") : "#6c47ff";
  try {
    var notes = document.getElementById("h-notes").value.trim() || null;
  var payload = { name: name, icon: icon, color: color, notes: notes };
    var res;
    if (editingHabitId) {
      res = await sb.from("habits").update(payload).eq("id", editingHabitId).select().single();
    } else {
      payload.user_id = currentUser.id;
      res = await sb.from("habits").insert(payload).select().single();
    }
    if (res.error) throw res.error;
    closeHabitModal();
    var today = new Date().toISOString().split("T")[0];
    var habitsRes = await sb.from("habits").select("*").eq("user_id", currentUser.id).order("created_at");
    habits = (habitsRes && habitsRes.data) ? habitsRes.data : [];
    renderHabits();
    showToast(editingHabitId ? "Habit updated!" : "Habit added! 🔥", "success");
  } catch(err) { showToast(err.message, "error"); }
};

window.deleteHabit = function() {
  if (!editingHabitId) return;
  var h = habits.find(function(x) { return x.id === editingHabitId; });
  showConfirm("Delete Habit", "Delete \"" + (h ? h.name : "this habit") + "\"? All logs will be lost.", async function() {
    try {
      var res = await sb.from("habits").delete().eq("id", editingHabitId);
      if (res.error) throw res.error;
      closeHabitModal();
      habits = habits.filter(function(x) { return x.id !== editingHabitId; });
      renderHabits();
      showToast("Habit deleted.");
    } catch(err) { showToast(err.message, "error"); }
  });
};

// ===== AUTH STATE LISTENER =====
sb.auth.onAuthStateChange(async function(event, session) {
  currentUser = session ? session.user : null;
  if (currentUser) {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    var savedTheme = localStorage.getItem("celio-campus-theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);
    document.querySelector(".theme-btn").textContent = savedTheme === "dark" ? "☀" : "🌙";
    if (localStorage.getItem("celio-campus-sb-collapsed") === "1") {
      document.getElementById("sidebar").classList.add("collapsed");
    }
    await loadAll();
    if (semesters.length > 0 && activeSemester) {
      document.getElementById("tab-nav").style.display = "flex";
      document.getElementById("topbar-add-btn").style.display = "flex";
      showTab("dashboard");
    } else {
      // New user with no semesters — show sidebar and prompt to create one
      document.getElementById("tab-nav").style.display = "none";
      document.getElementById("topbar-add-btn").style.display = "none";
    }
  } else {
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
    semesters = []; courses = []; assignments = [];
    activeSemester = null; activeCourse = null;
  }
});

})();
</script>
